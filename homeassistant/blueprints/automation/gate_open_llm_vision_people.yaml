blueprint:
  name: Gate open — LLM Vision people alert
  description: |
    When a gate contact opens, capture several still JPEGs from the camera at short intervals (same mechanism as
    Lovelace snapshots — works with Frigate/go2rtc feeds). Those files are sent together to LLM Vision **image_analyzer**
    so the model sees multiple frames without using **stream_analyzer** (which relies on camera ``entity_picture`` and
    internal HTTP fetches and often fails with all cameras offline on Frigate cameras).

    Notifies when classification is **PEOPLE**. If the vision provider returns tool-call JSON / unusable text,
    optionally falls back to a Frigate person occupancy (or count) sensor.

    Configure one automation per gate (east, west, back yard) with its sensor, camera, and dashboard path.
  domain: automation
  homeassistant:
    min_version: '2024.6.0'
  input:
    gate_name:
      name: Gate name
      description: Shown in notifications and in the LLM prompt (e.g. East gate, West gate).
      selector:
        text:
    gate_slug:
      name: Snapshot file slug
      description: Safe prefix for /config/www/tmp/<slug>_timestamp_<n>.jpg used for frames and notification thumbnail (_1) (e.g. east_gate, west_gate).
      default: gate
      selector:
        text:
    gate_sensor:
      name: Gate door sensor
      description: Binary sensor that indicates the gate is open (see Gate open state).
      selector:
        entity:
          domain: binary_sensor
    gate_open_state:
      name: Gate open state
      description: State value when the gate is open (often "on").
      default: "on"
      selector:
        text:
    camera:
      name: Camera
      selector:
        entity:
          domain: camera
    frigate_person_sensor:
      name: Frigate person sensor (fallback)
      description: >
        Optional. Used when LLM Vision returns tool-call junk or UNKNOWN.
        Prefer binary_sensor.*_person_occupancy; sensor.*_person_count also works (on if > 0).
      default: ""
      selector:
        entity:
          domain:
            - binary_sensor
            - sensor
    llmvision_provider:
      name: LLM Vision provider
      description: Config entry for your CodeProject / OpenAI-compatible provider.
      selector:
        config_entry:
          integration: llmvision
    llmvision_model:
      name: Vision model
      default: gpt-4o-mini
      selector:
        text:
    target_width:
      name: Target image width (px)
      description: Downscale width sent to the model (smaller = faster upload).
      default: 1280
      selector:
        number:
          min: 512
          max: 1920
          step: 64
          mode: slider
    frame_interval_seconds:
      name: Seconds between snapshots
      description: Wait time after each frame before capturing the next (no delay before the first shot).
      default: 1
      selector:
        number:
          min: 0
          max: 10
          step: 1
          mode: slider
    stream_max_frames:
      name: Number of still frames
      description: How many JPEG snapshots to capture and send to the model (spread over ~interval × (frames − 1)).
      default: 8
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: slider
    public_base_url:
      name: Public image URL base
      description: Must end with / — prepended to the snapshot path for the mobile image (e.g. https://example.com/local/).
      default: "https://ha.mostardesigns.com/local/"
      selector:
        text:
    notification_click_path:
      name: Dashboard path (tap / click action)
      description: Lovelace path opened from the mobile notification (url / clickAction), e.g. /backyard-yaml/backyard-east-side.
      default: /backyard-yaml/backyard
      selector:
        text:
    notify_service:
      name: Notify service
      description: Home Assistant notify service for the phone (e.g. notify.mobile_app_my_phone).
      default: notify.mobile_app_zlatko_fold_5
      selector:
        text:
    notify_people:
      name: Notify people
      description: Send to all mobile-app devices registered to selected people.
      selector:
        entity:
          domain: person
          multiple: true

mode: single
variables:
  gate_name: !input gate_name
  gate_slug: !input gate_slug
  snapshot_timestamp: '{{ now().strftime("%Y%m%d-%H%M%S") }}'
  snapshot_frame_count: !input stream_max_frames
  frame_interval_seconds: !input frame_interval_seconds
  snapshot_rel: 'tmp/{{ gate_slug }}_{{ snapshot_timestamp }}_1.jpg'
  snapshot_path: '/config/www/{{ snapshot_rel }}'
  public_base_url: !input public_base_url
  public_image_url: '{{ public_base_url }}{{ snapshot_rel }}'
  frigate_person_sensor: !input frigate_person_sensor
triggers:
  - trigger: state
    entity_id: !input gate_sensor
    to: !input gate_open_state
actions:
  - repeat:
      count: '{{ snapshot_frame_count | int }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ repeat.index > 1 }}'
        then:
        - delay:
            seconds: '{{ frame_interval_seconds }}'
      - action: camera.snapshot
        target:
          entity_id: !input camera
        data:
          filename: '/config/www/tmp/{{ gate_slug }}_{{ snapshot_timestamp }}_{{ repeat.index }}.jpg'
  - variables:
      clip_image_files: "{% set ns = namespace(p=[]) %}{% for i in range(1, snapshot_frame_count | int + 1) %}{% set ns.p = ns.p + ['/config/www/tmp/' ~ gate_slug ~ '_' ~ snapshot_timestamp ~ '_' ~ i ~ '.jpg'] %}{% endfor %}{{ ns.p | join('\n') }}"
  - action: llmvision.image_analyzer
    data:
      provider: !input llmvision_provider
      model: !input llmvision_model
      image_file: '{{ clip_image_files }}'
      include_filename: false
      store_in_timeline: false
      use_memory: false
      temperature: 0.2
      max_tokens: 900
      generate_title: false
      expose_images: false
      target_width: !input target_width
      message: "You are viewing multiple still frames from the {{ gate_name }} security camera, captured in order over a few seconds. Infer motion and activity across frames — paths people take, pauses, interacting with the gate or objects, carrying items, gestures, entering or leaving view.\n\nCRITICAL OUTPUT RULES:\n- Do NOT call tools, functions, or MCP servers.\n- Do NOT output JSON, code fences, file paths, or tool-call blocks.\n- Do NOT invent pets or people that are not visible.\n- Your entire reply must be exactly 3 lines of plain text and nothing else.\n\nLine 1 — classification only: PEOPLE if any human appears in any frame (partial/small counts). Otherwise NOPEOPLE. No other words on this line.\nLine 2 — home log: concrete observation across frames (who/where/what they do). Max 240 characters. One paragraph. Do not mention images/frames/camera.\nLine 3 — phone alert: shorter factual summary. Max 120 characters. No meta text."
    response_variable: ai_response
  - variables:
      reply_raw: >-
        {% set r = ai_response.response_text | default(ai_response.text, true) | default('', true) %}
        {% if r is mapping or r is iterable and r is not string %}
          {{ r | to_json }}
        {% else %}
          {{ r }}
        {% endif %}
      reply: >-
        {% set raw = reply_raw | string %}
        {% set cleaned = raw
          | regex_replace('(?is)```.*?```', ' ')
          | regex_replace('(?is)\\{\\s*"name"\\s*:.*?\\}\\s*', ' ')
          | regex_replace("(?is)\\{\\s*'name'\\s*:.*?\\}\\s*", ' ')
          | regex_replace('(?im)^\\s*For each image file:.*$', ' ')
          | regex_replace('(?im)^\\s*-\\s*Analyze it with.*$', ' ')
          | trim %}
        {% set ans = cleaned | regex_findall('(?is)Answer:\\s*(.*)$') %}
        {% if ans | length > 0 %}
          {{ ans[0] | trim }}
        {% else %}
          {{ cleaned }}
        {% endif %}
      llm_label: >-
        {% set text = reply | string %}
        {% set labeled = text | regex_findall('(?im)(?:^|\\n)\\s*People\\s*:\\s*(NOPEOPLE|PEOPLE)\\b') %}
        {% if labeled | length > 0 %}
          {{ labeled[-1] | upper }}
        {% else %}
          {% set exact = text | regex_findall('(?m)^\\s*(NOPEOPLE|PEOPLE)\\s*[.!]?\\s*$') %}
          {% if exact | length > 0 %}
            {{ exact[0] | upper }}
          {% else %}
            {% set caps = text | regex_findall('\\b(NOPEOPLE|PEOPLE)\\b') %}
            {{ (caps[-1] | upper) if caps | length > 0 else '' }}
          {% endif %}
        {% endif %}
      llm_unusable: >-
        {% set raw = reply_raw | string %}
        {% set cleaned = reply | string | trim %}
        {% set label = llm_label | string | trim | upper %}
        {% if raw | regex_findall('(?i)"name"\\s*:\\s*"(describe_image|python_m_mcp|media_understand)') | length > 0 %}
          yes
        {% elif cleaned in ['', '}', '{', "Couldn't generate content. Check logs for details."] %}
          yes
        {% elif cleaned | regex_findall('(?i)(Describe local image files|For each frame analyzed|List the person/pet)') | length > 0 %}
          yes
        {% elif label not in ['PEOPLE', 'NOPEOPLE'] %}
          yes
        {% else %}
          no
        {% endif %}
      frigate_people: >-
        {% set eid = frigate_person_sensor | default('', true) | string %}
        {% if eid in ['', 'None', 'unknown', 'unavailable', '[]'] %}
          no
        {% elif eid.startswith('binary_sensor.') %}
          {{ 'yes' if is_state(eid, 'on') else 'no' }}
        {% elif eid.startswith('sensor.') %}
          {{ 'yes' if (states(eid) | float(0)) > 0 else 'no' }}
        {% else %}
          no
        {% endif %}
      gate_class_idx: >-
        {% set sl = (reply | string).split('\n') %}
        {% set ns = namespace(idx=-1) %}
        {% for i in range(sl | length) %}
          {% if ns.idx < 0 %}
            {% set line = sl[i] | trim %}
            {% if line | regex_findall('(?i)^People\\s*:\\s*(NOPEOPLE|PEOPLE)\\b') | length > 0
               or line | regex_findall('^(NOPEOPLE|PEOPLE)\\s*[.!]?\\s*$') | length > 0 %}
              {% set ns.idx = i %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.idx }}
      gate_classification: >-
        {% set label = llm_label | string | trim | upper %}
        {% if label in ['PEOPLE', 'NOPEOPLE'] %}
          {{ label }}
        {% elif (llm_unusable | string | trim) == 'yes' %}
          {{ 'PEOPLE' if (frigate_people | string | trim) == 'yes' else 'NOPEOPLE' }}
        {% else %}
          UNKNOWN
        {% endif %}
      log_description: >-
        {% set label = llm_label | string | trim | upper %}
        {% set unusable = (llm_unusable | string | trim) == 'yes' %}
        {% if unusable and label not in ['PEOPLE', 'NOPEOPLE'] %}
          {% if gate_classification == 'PEOPLE' %}
            Frigate detected a person near {{ gate_name }} (vision model unavailable)
          {% else %}
            No person detected by Frigate at {{ gate_name }} (vision model unavailable)
          {% endif %}
        {% elif unusable and label == 'NOPEOPLE' %}
          No people at {{ gate_name }}
        {% elif unusable and label == 'PEOPLE' %}
          Person activity at {{ gate_name }}
        {% else %}
          {% set sl = (reply | string).split('\n') %}
          {% set idx = gate_class_idx | default(-1) | int %}
          {% set ns = namespace(parts=[]) %}
          {% if idx >= 0 %}
            {% for i in range(idx + 1, sl | length) %}
              {% set t = sl[i] | trim %}
              {% if t | length > 0
                 and (t | regex_findall('(?i)^People\\s*:') | length) == 0
                 and (t | regex_findall('^(NOPEOPLE|PEOPLE)\\s*$') | length) == 0
                 and (t | regex_findall('(?i)(List the person|For each frame|Describe local)') | length) == 0 %}
                {% set ns.parts = ns.parts + [t | regex_replace('(?i)^(Alert|Line\\s*2|Line\\s*3)\\s*:\\s*', '')] %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {% if ns.parts | length > 0 %}
            {{ ns.parts[0] | truncate(240, true, '...') }}
          {% elif gate_classification == 'PEOPLE' %}
            Person activity at {{ gate_name }}
          {% elif gate_classification == 'NOPEOPLE' %}
            No people at {{ gate_name }}
          {% else %}
            Gate activity at {{ gate_name }}
          {% endif %}
        {% endif %}
      mobile_short: >-
        {% if gate_classification == 'PEOPLE' %}
          Person at {{ gate_name }}
        {% elif gate_classification == 'NOPEOPLE' %}
          No people at {{ gate_name }}
        {% else %}
          Gate activity at {{ gate_name }}
        {% endif %}
      notify_services: >-
        {% set ns = namespace(services=[]) %}
        {% for p in (notify_people | default([], true)) %}
          {% for dt in state_attr(p, 'device_trackers') | default([], true) %}
            {% if dt is string and dt.startswith('device_tracker.') %}
              {% set slug = dt | replace('device_tracker.', '') %}
              {% set svc = 'notify.mobile_app_' ~ slug %}
              {% if svc not in ns.services %}
                {% set ns.services = ns.services + [svc] %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endfor %}
        {{ ns.services | to_json }}
  - action: input_text.set_value
    data:
      entity_id: input_text.gate_ai_last_gate
      value: '{{ gate_name }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.gate_ai_last_classification
      value: '{{ gate_classification }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.gate_ai_last_summary
      value: '{{ log_description | truncate(255, true, "") }}'
  - action: input_datetime.set_datetime
    data:
      entity_id: input_datetime.gate_ai_last_analysis_time
      datetime: '{{ now().strftime("%Y-%m-%d %H:%M:%S") }}'
  - if:
    - condition: template
      value_template: "{{ gate_classification == 'PEOPLE' }}"
    then:
    - action: persistent_notification.create
      data:
        notification_id: '{{ gate_slug }}_ai_{{ snapshot_timestamp }}'
        title: '{{ gate_name }} · {{ log_description | truncate(65, true, ''...'') }}'
        message: |
          {{ log_description }}

          ![{{ gate_name }}](/local/{{ snapshot_rel }})
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ (notify_services | from_json | count) > 0 }}'
        sequence:
        - repeat:
            for_each: '{{ notify_services | from_json }}'
            sequence:
            - action: '{{ repeat.item }}'
              continue_on_error: true
              data:
                title: '{{ gate_name }} · {{ mobile_short | truncate(48, true, ''...'') }}'
                message: '{{ mobile_short }}'
                data:
                  image: '{{ public_image_url }}'
                  url: !input notification_click_path
                  clickAction: !input notification_click_path
                  push:
                    sound:
                      name: default
                      critical: 1
                      volume: 1
      default:
      - action: !input notify_service
        data:
          title: '{{ gate_name }} · {{ mobile_short | truncate(48, true, ''...'') }}'
          message: '{{ mobile_short }}'
          data:
            image: '{{ public_image_url }}'
            url: !input notification_click_path
            clickAction: !input notification_click_path
            push:
              sound:
                name: default
                critical: 1
                volume: 1
