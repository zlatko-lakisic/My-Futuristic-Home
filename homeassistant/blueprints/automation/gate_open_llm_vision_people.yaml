blueprint:
  name: Gate open — LLM Vision people alert
  description: |
    When a gate contact opens, capture several still JPEGs from the camera at short intervals (same mechanism as
    Lovelace snapshots — works with Frigate/go2rtc feeds). Those files are sent together to LLM Vision **image_analyzer**
    so the model sees multiple frames without using **stream_analyzer** (which relies on camera ``entity_picture`` and
    internal HTTP fetches and often fails with all cameras offline on Frigate cameras).

    Notifies when line 1 classifies **PEOPLE**. Line 2–3 describe activity across the sampled frames.

    If your vision model only accepts one image per request (some Ollama setups), lower **Number of still frames** to 1–2
    or use a multi-image-capable model.

    Configure one automation per gate (east, west, back yard) with its sensor, camera, and dashboard path.
  domain: automation
  homeassistant:
    min_version: '2024.6.0'
  input:
    gate_name:
      name: Gate name
      description: Shown in notifications and in the LLM prompt (e.g. East gate, West gate).
      selector:
        text:
    gate_slug:
      name: Snapshot file slug
      description: Safe prefix for /config/www/tmp/<slug>_timestamp_<n>.jpg used for frames and notification thumbnail (_1) (e.g. east_gate, west_gate).
      default: gate
      selector:
        text:
    gate_sensor:
      name: Gate door sensor
      description: Binary sensor that indicates the gate is open (see Gate open state).
      selector:
        entity:
          domain: binary_sensor
    gate_open_state:
      name: Gate open state
      description: State value when the gate is open (often "on").
      default: "on"
      selector:
        text:
    camera:
      name: Camera
      selector:
        entity:
          domain: camera
    llmvision_provider:
      name: LLM Vision provider
      description: Config entry for your CodeProject / OpenAI-compatible provider.
      selector:
        config_entry:
          integration: llmvision
    llmvision_model:
      name: Vision model
      default: gpt-4o-mini
      selector:
        text:
    target_width:
      name: Target image width (px)
      description: Downscale width sent to the model (smaller = faster upload).
      default: 1280
      selector:
        number:
          min: 512
          max: 1920
          step: 64
          mode: slider
    frame_interval_seconds:
      name: Seconds between snapshots
      description: Wait time after each frame before capturing the next (no delay before the first shot).
      default: 1
      selector:
        number:
          min: 0
          max: 10
          step: 1
          mode: slider
    stream_max_frames:
      name: Number of still frames
      description: How many JPEG snapshots to capture and send to the model (spread over ~interval × (frames − 1)).
      default: 8
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: slider
    public_base_url:
      name: Public image URL base
      description: Must end with / — prepended to the snapshot path for the mobile image (e.g. https://example.com/local/).
      default: "https://ha.mostardesigns.com/local/"
      selector:
        text:
    notification_click_path:
      name: Dashboard path (tap / click action)
      description: Lovelace path opened from the mobile notification (url / clickAction), e.g. /backyard-yaml/backyard-east-side.
      default: /backyard-yaml/backyard
      selector:
        text:
    notify_service:
      name: Notify service
      description: Home Assistant notify service for the phone (e.g. notify.mobile_app_my_phone).
      default: notify.mobile_app_zlatko_fold_5
      selector:
        text:
    notify_people:
      name: Notify people
      description: Send to all mobile-app devices registered to selected people.
      selector:
        entity:
          domain: person
          multiple: true

mode: single
variables:
  gate_name: !input gate_name
  gate_slug: !input gate_slug
  snapshot_timestamp: '{{ now().strftime("%Y%m%d-%H%M%S") }}'
  snapshot_frame_count: !input stream_max_frames
  frame_interval_seconds: !input frame_interval_seconds
  snapshot_rel: 'tmp/{{ gate_slug }}_{{ snapshot_timestamp }}_1.jpg'
  snapshot_path: '/config/www/{{ snapshot_rel }}'
  public_base_url: !input public_base_url
  public_image_url: '{{ public_base_url }}{{ snapshot_rel }}'
triggers:
  - trigger: state
    entity_id: !input gate_sensor
    to: !input gate_open_state
actions:
  - repeat:
      count: '{{ snapshot_frame_count | int }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ repeat.index > 1 }}'
        then:
        - delay:
            seconds: '{{ frame_interval_seconds }}'
      - action: camera.snapshot
        target:
          entity_id: !input camera
        data:
          filename: '/config/www/tmp/{{ gate_slug }}_{{ snapshot_timestamp }}_{{ repeat.index }}.jpg'
  - variables:
      clip_image_files: "{% set ns = namespace(p=[]) %}{% for i in range(1, snapshot_frame_count | int + 1) %}{% set ns.p = ns.p + ['/config/www/tmp/' ~ gate_slug ~ '_' ~ snapshot_timestamp ~ '_' ~ i ~ '.jpg'] %}{% endfor %}{{ ns.p | join('\n') }}"
  - action: llmvision.image_analyzer
    data:
      provider: !input llmvision_provider
      model: !input llmvision_model
      image_file: '{{ clip_image_files }}'
      include_filename: true
      store_in_timeline: false
      use_memory: false
      temperature: 0.2
      max_tokens: 900
      generate_title: false
      expose_images: false
      target_width: !input target_width
      message: "You are viewing multiple still frames from the {{ gate_name }} security camera, captured in order over a few seconds. Infer motion and activity across frames — paths people take, pauses, interacting with the gate or objects, carrying items, gestures, entering or leaving view.\nYour reply must be exactly 3 lines and nothing else: no title, no preamble, no blank lines, no markdown, no numbering. The very first character of your reply must be the letter P or N (the start of PEOPLE or NOPEOPLE).\n\nLine 1 — classification (this line is used by automation; format matters): output ONLY the single word PEOPLE if any human appears in any frame (foreground or background, partial or small figures count). Otherwise ONLY the single word NOPEOPLE. No other words or punctuation on line 1.\n\nLine 2 — home log (standalone; do not mention lines or instructions): concrete observation of activity across the frames — how many people if any, where they move or stand, what they appear to be doing (verbs). Notable clothing or carried objects. Do not write \"these images\", \"the frames\", \"the video\", or \"the camera\". Max 240 characters, one paragraph.\n\nLine 3 — phone alert (standalone; must not refer to other lines): shorter factual summary of what people are doing (or that no one appeared). Max 120 characters. Do not write \"line 1\", \"line 2\", \"line 3\", \"same as\", \"see above\", \"as before\", or any meta text. Do not quote or paraphrase these instructions."
    response_variable: ai_response
  - variables:
      reply: "{{ ai_response.response_text | default(ai_response.text, true) | default('', true) | trim }}"
      gate_class_idx: "{% set sl = reply.splitlines() %}{% set ns = namespace(idx=-1) %}{% for i in range(sl | length) %}{% if ns.idx < 0 %}{% set line = sl[i] %}{% set cleaned = line | regex_replace('(?i)^[\\s*_`]*(?:line\\s*1\\s*[:.)-]*)?\\s*', '') | trim %}{% set cleaned = cleaned | regex_replace('(?i)^(?:\\d+\\s*[.)\\-])?\\s*', '') | trim %}{% set parts = cleaned.split() %}{% set w = parts[0] if parts | length > 0 else '' %}{% set tok = w | regex_replace('[^A-Za-z]', '') | upper %}{% if tok == 'PEOPLE' or tok == 'NOPEOPLE' %}{% set ns.idx = i %}{% endif %}{% endif %}{% endfor %}{{ ns.idx }}"
      gate_classification: "{% set sl = reply.splitlines() %}{% set idx = gate_class_idx | default(-1) | int %}{% if idx < 0 %}UNKNOWN{% else %}{% set line = sl[idx] %}{% set cleaned = line | regex_replace('(?i)^[\\s*_`]*(?:line\\s*1\\s*[:.)-]*)?\\s*', '') | trim %}{% set cleaned = cleaned | regex_replace('(?i)^(?:\\d+\\s*[.)\\-])?\\s*', '') | trim %}{% set parts = cleaned.split() %}{% set w = parts[0] if parts | length > 0 else '' %}{{ w | regex_replace('[^A-Za-z]', '') | upper }}{% endif %}"
      log_description: "{% set sl = reply.splitlines() %}{% set idx = gate_class_idx | default(-1) | int %}{% if idx >= 0 and idx + 1 < sl | length %}{{ sl[idx + 1] | trim | truncate(240, true, '...') }}{% elif sl | length > 1 %}{{ sl[1] | trim | truncate(240, true, '...') }}{% else %}{{ reply | truncate(240, true, '...') }}{% endif %}"
      mobile_short: "{% set sl = reply.splitlines() %}{% set idx = gate_class_idx | default(-1) | int %}{% if idx >= 0 and idx + 2 < sl | length %}{{ sl[idx + 2] | trim | truncate(120, true, '...') }}{% elif idx >= 0 and idx + 1 < sl | length %}{{ sl[idx + 1] | trim | truncate(120, true, '...') }}{% elif sl | length > 2 %}{{ sl[2] | trim | truncate(120, true, '...') }}{% elif sl | length > 1 %}{{ sl[1] | trim | truncate(120, true, '...') }}{% else %}Person at {{ gate_name }}{% endif %}"
      notify_services: >-
        {% set ns = namespace(services=[]) %}
        {% for p in (notify_people | default([], true)) %}
          {% for dt in state_attr(p, 'device_trackers') | default([], true) %}
            {% if dt is string and dt.startswith('device_tracker.') %}
              {% set slug = dt | replace('device_tracker.', '') %}
              {% set svc = 'notify.mobile_app_' ~ slug %}
              {% if svc not in ns.services %}
                {% set ns.services = ns.services + [svc] %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endfor %}
        {{ ns.services | to_json }}
  - action: input_text.set_value
    data:
      entity_id: input_text.gate_ai_last_gate
      value: '{{ gate_name }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.gate_ai_last_classification
      value: '{{ gate_classification }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.gate_ai_last_summary
      value: '{{ log_description | truncate(255, true, "") }}'
  - action: input_datetime.set_datetime
    data:
      entity_id: input_datetime.gate_ai_last_analysis_time
      datetime: '{{ now().strftime("%Y-%m-%d %H:%M:%S") }}'
  - if:
    - condition: template
      value_template: "{% set sl = reply.splitlines() %}{% set idx = gate_class_idx | default(-1) | int %}{% if idx < 0 %}false{% else %}{% set line = sl[idx] %}{% set cleaned = line | regex_replace('(?i)^[\\s*_`]*(?:line\\s*1\\s*[:.)-]*)?\\s*', '') | trim %}{% set cleaned = cleaned | regex_replace('(?i)^(?:\\d+\\s*[.)\\-])?\\s*', '') | trim %}{% set parts = cleaned.split() %}{% set w = parts[0] if parts | length > 0 else '' %}{% set tok = w | regex_replace('[^A-Za-z]', '') | upper %}{{ tok == 'PEOPLE' }}{% endif %}"
    then:
    - action: persistent_notification.create
      data:
        notification_id: '{{ gate_slug }}_ai_{{ snapshot_timestamp }}'
        title: '{{ gate_name }} · {{ log_description | truncate(65, true, ''...'') }}'
        message: |
          {{ log_description }}

          ![{{ gate_name }}](/local/{{ snapshot_rel }})
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ (notify_services | from_json | count) > 0 }}'
        sequence:
        - repeat:
            for_each: '{{ notify_services | from_json }}'
            sequence:
            - action: '{{ repeat.item }}'
              continue_on_error: true
              data:
                title: '{{ gate_name }} · {{ mobile_short | truncate(48, true, ''...'') }}'
                message: '{{ mobile_short }}'
                data:
                  image: '{{ public_image_url }}'
                  url: !input notification_click_path
                  clickAction: !input notification_click_path
                  push:
                    sound:
                      name: default
                      critical: 1
                      volume: 1
      default:
      - action: !input notify_service
        data:
          title: '{{ gate_name }} · {{ mobile_short | truncate(48, true, ''...'') }}'
          message: '{{ mobile_short }}'
          data:
            image: '{{ public_image_url }}'
            url: !input notification_click_path
            clickAction: !input notification_click_path
            push:
              sound:
                name: default
                critical: 1
                volume: 1
