- id: '1771793860550'
  alias: Open Garage - Car Arrived
  description: ''
  triggers:
  - topic: frigate/events
    trigger: mqtt
  conditions:
  - condition: state
    entity_id: cover.garage_door_door
    state: closed
  - condition: template
    value_template: "{% set data = trigger.payload_json %} {{ data['type'] == 'update'\n   and data['after']['label'] == 'car'\n   and data['after']['sub_label'] == 'KXS-9837'\n   and data['after']['score'] > 0.80\n   and 'near_driveway' in data['after']['current_zones']\n   and 'near_driveway' not in data['before']['current_zones'] }}\n"
  actions:
  - target:
      entity_id: cover.garage_door_door
    action: cover.open_cover
  mode: single
- id: '1771794032483'
  alias: Close Garage - Car Left
  triggers:
  - topic: frigate/events
    trigger: mqtt
  conditions:
  - condition: state
    entity_id: cover.garage_door
    state: open
  - condition: template
    value_template: "{% set data = trigger.payload_json %} {{ data['type'] == 'update'\n   and data['after']['label'] == 'car'\n   and data['after']['sub_label'] == 'KXS-9837'\n   and data['after']['score'] > 0.80\n   and 'near_driveway' not in data['after']['current_zones']\n   and 'near_driveway' in data['before']['current_zones'] }}\n"
  actions:
  - target:
      entity_id: cover.garage_door_door
    action: cover.close_cover
  mode: single
