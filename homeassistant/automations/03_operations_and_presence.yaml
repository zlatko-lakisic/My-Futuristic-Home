- id: '1749373783674'
  alias: Ping Z-wave Devices
  description: ''
  triggers:
  - at: 06:05:00
    trigger: time
  - at: '14:05:00'
    trigger: time
  - at: '22:05:00'
    trigger: time
  actions:
  - repeat:
      for_each: "{% set ns = namespace(items=[]) %} {% for entity in integration_entities('zwave_js') %}\n  {% if entity.endswith('_ping') %}\n    {% if states(entity.replace('button.','sensor.').replace('_ping','_battery_level'))=='unknown' %}\n      {% set ns.items = ns.items + [entity] %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ ns.items }}"
      sequence:
      - delay: 5
      - target:
          entity_id: '{{ repeat.item }}'
        action: button.press
  mode: single
