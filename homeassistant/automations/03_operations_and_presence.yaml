- id: '1776123456789'
  alias: Restart Frigate and CodeProject AI on high inference speed
  description: Restart both containers if deepstack inference speed stays above 1000 for 15 seconds.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.frigate_deepstack_inference_speed
    above: 1000
    for:
      hours: 0
      minutes: 0
      seconds: 15
  conditions:
  - condition: template
    value_template: '{{ this.attributes.last_triggered is none or (as_timestamp(now()) - as_timestamp(this.attributes.last_triggered)) > 600 }}'
  actions:
  - action: button.press
    target:
      entity_id: button.frigate_restart_container
  - action: button.press
    target:
      entity_id: button.codeproject_ai_server_restart_container
  mode: single
