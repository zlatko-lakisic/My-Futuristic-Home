- id: '1757608292934'
  alias: Front Door Motion Lights
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.front_door_motion
    from: 'off'
    to: 'on'
    trigger: state
  conditions:
  - condition: sun
    before: sunrise
    after: sunset
  actions:
  - alias: Turn on the light
    target:
      device_id:
      - 9c320fde2aa1f8056696a3415531833b
      - 27bd8df3dd2ed23f150042578bbcad9e
    action: light.turn_on
    data: {}
  - alias: Wait until there is no motion from device
    wait_for_trigger:
    - entity_id:
      - binary_sensor.front_door_motion
      from: 'on'
      to: 'off'
      trigger: state
  - alias: Wait the number of seconds that has been set
    delay: 120
  - alias: Turn off the light
    target:
      device_id:
      - 9c320fde2aa1f8056696a3415531833b
      - 27bd8df3dd2ed23f150042578bbcad9e
    action: light.turn_off
  mode: restart
  max_exceeded: silent
