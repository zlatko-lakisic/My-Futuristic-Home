- id: '1773361989097'
  alias: East Side Motion
  description: ''
  use_blueprint:
    path: valentinfrlch/event_summary.yaml
    input:
      camera_entities:
      - camera.east_side
      motion_sensors:
      - binary_sensor.east_side_motion
      provider: 01KPW6YJ00E65E4HXM9Q53093Q
      model: omega-ollama
      notify: true
      notify_device:
      - 3cab96ade88a859c680543da3cbc807e
      file_path: /config/www/snapshots/{{ camera_file_path }}/last_motion.jpg
      notification_channel: '{{ camera }} snapshot'
      run_conditions:
      - condition: state
        entity_id: binary_sensor.east_side_door_door
        state:
        - 'on'
        enabled: false
