- id: '1748680509520'
  alias: LLM Testing
  description: ''
  triggers: []
  conditions: []
  actions:
  - action: llmvision.image_analyzer
    metadata: {}
    data:
      include_filename: true
      max_tokens: 100
      temperature: 0.2
      provider: 01JWHT1NGX5W2D8NZHKFD7E29J
      message: Describe the image.
      remember: true
      expose_images: true
      model: gemini-2.0-flash
      image_entity:
      - camera.driveway
      - image.driveway_car
    response_variable: response
  - action: persistent_notification.create
    metadata: {}
    data:
      title: Front Camera Motion
      message: '{{response.response_text}}'
  mode: single
