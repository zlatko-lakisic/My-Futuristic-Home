    device_id: 3cab96ade88a859c680543da3cbc807e
    domain: device_tracker
    entity_id: 1c267935a8db63cdffb71d8fa6e2c40c
    type: is_not_home
    enabled: false
  actions:
  - action: script.process_ai_analysis_and_notification
    metadata: {}
    data:
      write_persistent_notification: true
      camera_id: camera.driveway
      ai_prompt: 'Summarize the events based on a series of images captured at short intervals. If a vehicle is present describe it, including the make, model, color style, and provide the license plate. If there are any people, describe them and what they are doing. Otherwise respond with: ''No activity observed.'''
