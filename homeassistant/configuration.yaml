    latitude: 41.0137572
    longitude: -73.8082339

mqtt: !include mqtt.yaml

input_select:
  bhyve_manual_zone:
    name: BHyve Manual Zone
    # Labels must match each switch entity's friendly_name (see Developer tools → States).
    options:
      - Cabbage zone
      - East Lawn
      - Flower Bed
      - Top Flowers
      - Kitchen Lawn
      - Zone 4 zone
      - Front Lawn
      - Peppers & Kale Zone zone
      - Tomato Zone zone
      - Top Zone zone
      - Zucchini Zone zone
    initial: Front Lawn
    icon: mdi:sprinkler-variant

input_number:
  bhyve_manual_duration_minutes:
    name: BHyve Watering Duration
    min: 1
    max: 25
    step: 1
    mode: slider
    unit_of_measurement: min
    initial: 10
    icon: mdi:timer-outline

