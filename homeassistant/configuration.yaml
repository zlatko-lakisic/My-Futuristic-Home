homeassistant:
  country: US
  external_url: "https://ha.mostardesigns.com"
  internal_url: "http://192.168.89.25:8123"
  #customize: !include customize.yaml
  media_dirs:
    share_media: /media/public_share_4_ha_media
  allowlist_external_dirs:
    - "/config/www"
    - "/media/public_share_4_ha_media"
  packages:
    nvr_top_processes: !include packages/nvr_top_processes.yaml
    qbittorrent_speed_k: !include packages/qbittorrent_speed_k.yaml
    axis_frigate_gauge_sensors: !include packages/axis_frigate_gauge_sensors.yaml
    bhyve_manual_zone_resolve: !include packages/bhyve_manual_zone_resolve.yaml

influxdb:
  api_version: "1"
  host: "127.0.0.1"
  port: "8086"
  verify_ssl: false
  ssl: false
  database: "home_assistant"
  username: "home_assistant"
  password: !secret influxdb_password
  # InfluxDB v2: use secrets / UI for token, bucket, and organization — never commit them.
  max_retries: 3

template: !include templates.yaml
    
climate:
  - unique_id: "7966441f-ee57-471d-a387-ab0a879859ff"
    platform: climate_template
    name: New Livingroom Climate
    modes:
      - "off"
      - "cool"
      - "heat"
    min_temp: 55
    max_temp: 85
    
    # get current temp.
    current_temperature_template: "{{ states('sensor.living_room_temperature') }}"
    
    # get current humidity.
    current_humidity_template: "{{ states('sensor.living_room_humidity') }}"

    # Mirror real equipment (manual changes on Nest or Midea are picked up here).
    hvac_mode_template: >-
      {% set nest = states('climate.living_room') %}
      {% set nest_act = state_attr('climate.living_room', 'hvac_action') | default('', true) %}
      {% set heating = nest == 'heat' or (nest == 'auto' and nest_act == 'heating') %}
      {% set midea = states('climate.150633094697190_climate') %}
      {% set cooling = is_state('switch.150633094697190_power', 'on')
        or midea in ['cool', 'dry', 'fan_only'] %}
      {% if heating %}
        heat
      {% elif cooling %}
        cool
      {% else %}
        off
      {% endif %}
    # Nest/Midea hvac_action → combined action (idle = not actively heating or cooling).
    hvac_action_template: "{% set n = state_attr('climate.living_room', 'hvac_action') | default('', true) | lower %}{% set m = state_attr('climate.150633094697190_climate', 'hvac_action') | default('', true) | lower %}{% if n in ['heating', 'preheating'] %}heating{% elif m in ['cooling', 'drying'] %}cooling{% else %}idle{% endif %}"
    target_temperature_template: >-
      {% set nest = states('climate.living_room') %}
      {% set nest_act = state_attr('climate.living_room', 'hvac_action') | default('', true) %}
      {% set heating = nest == 'heat' or (nest == 'auto' and nest_act == 'heating') %}
      {% set midea = states('climate.150633094697190_climate') %}
      {% set cooling = is_state('switch.150633094697190_power', 'on')
        or midea in ['cool', 'dry', 'fan_only'] %}
      {% if heating %}
        {{ state_attr('climate.living_room', 'temperature') | float(72) }}
      {% elif cooling %}
        {{ state_attr('climate.150633094697190_climate', 'temperature') | float(72) }}
      {% else %}
        {% set n = state_attr('climate.living_room', 'temperature') | default(72, true) | float(72) %}
        {% set a = state_attr('climate.150633094697190_climate', 'temperature') | default(72, true) | float(72) %}
        {{ ((n + a) / 2) | round(1) }}
      {% endif %}

    set_hvac_mode:
      - service: script.control_climate
        data:
          temperature: "{{ state_attr('climate.new_livingroom_climate', 'temperature') | float(72) }}"
          operation_mode: "{{ hvac_mode }}"
    set_temperature:
      - service: script.control_climate
        data:
          temperature: "{{ temperature }}"
          operation_mode: "{{ states('climate.new_livingroom_climate') }}"

notify:
  - name: ALL_DEVICES
    platform: group
    services:
      - action: notify_mobile_app_zlatko_fold5
      # Add more devices here, e.g.:
      # - action: notify_mobile_app_another_phone
