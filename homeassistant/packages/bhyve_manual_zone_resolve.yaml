# Resolves input_select.bhyve_manual_zone (friendly label) to a switch entity_id for scripts / UI.
template:
  - sensor:
      - name: BHyve zone entity
        unique_id: bhyve_zone_entity_resolve
        state: >-
          {% set label = states('input_select.bhyve_manual_zone') | default('', true) | trim %}
          {% if label in ['unknown', 'unavailable', 'none', ''] %}
            unknown
          {% elif label.startswith('switch.') %}
            {{ label }}
          {% else %}
            {% set zones = [
              'switch.garden_zone',
              'switch.east_lawn_timer_east_lawn_zone',
              'switch.east_lawn_timer_flower_bed_zone',
              'switch.flower_garden_back_lawn_time_2nd_tier_flowers_zone',
              'switch.flower_garden_back_lawn_time_back_lawn_zone_zone',
              'switch.unnamed_zone_zone_2',
              'switch.front_yard_controller_front_yard_zone',
              'switch.vegitable_garden_timer_peppers_kale_zone_zone',
              'switch.vegitable_garden_timer_tomato_zone_zone',
              'switch.vegitable_garden_timer_top_zone_zone',
              'switch.vegitable_garden_timer_zucchini_zone_zone',
            ] %}
            {% set ns = namespace(found='') %}
            {% for z in zones %}
              {% if (state_attr(z, 'friendly_name') | default('', true)) | trim == label %}
                {% set ns.found = z %}
              {% endif %}
            {% endfor %}
            {{ ns.found if ns.found else 'unknown' }}
          {% endif %}
