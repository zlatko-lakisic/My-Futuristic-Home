# Resolves input_select.bhyve_manual_zone (friendly label) to a valve entity_id for scripts / UI.
# Zone list must match entities whose friendly_name equals each input_select option (Developer tools → States).
template:
  - sensor:
      - name: BHyve zone entity
        unique_id: bhyve_zone_entity_resolve
        state: >-
          {% set label = states('input_select.bhyve_manual_zone') | default('', true) | trim %}
          {% if label in ['unknown', 'unavailable', 'none', ''] %}
            unknown
          {% elif label[:6] == 'valve.' %}
            {{ label }}
          {% elif label[:7] == 'switch.' %}
            {% set base = 'valve.' ~ (label | replace('switch.', '')) %}
            {% set with_zone_suffix = base ~ '_zone' %}
            {% if states(base) not in ['unknown', 'unavailable'] %}
              {{ base }}
            {% elif states(with_zone_suffix) not in ['unknown', 'unavailable'] %}
              {{ with_zone_suffix }}
            {% else %}
              {{ label }}
            {% endif %}
          {% elif label in ['Kitchen Lawn'] %}
            {{ 'valve.flower_garden_back_lawn_time_back_lawn_zone_zone' }}
          {% elif label in ['Corn', 'Corn zone', 'Flower Garden & Back Lawn Time Corn zone', 'Flower Garden & Back Lawn Time Zone 4 zone'] %}
            {{ 'valve.flower_garden_back_lawn_time_zone_4_zone' }}
          {% else %}
            {% set zones = [
              'valve.garden_zone',
              'valve.east_lawn_timer_east_lawn_zone_zone',
              'valve.east_lawn_timer_flower_bed_zone_zone',
              'valve.flower_garden_back_lawn_time_2nd_tier_flowers_zone',
              'valve.flower_garden_back_lawn_time_back_lawn_zone_zone',
              'valve.flower_garden_back_lawn_time_zone_4_zone',
              'valve.flower_garden_back_lawn_time_slope_kitchen_left_zone',
              'valve.front_yard_controller_front_yard_zone',
              'valve.unnamed_zone_zone_2',
              'valve.vegitable_garden_timer_peppers_kale_zone_zone',
              'valve.vegitable_garden_timer_tomato_zone_zone',
              'valve.vegitable_garden_timer_top_zone_zone',
            ] %}
            {% set ns = namespace(found='') %}
            {% for z in zones %}
              {% if (state_attr(z, 'friendly_name') | default('', true)) | trim == label %}
                {% set ns.found = z %}
              {% endif %}
            {% endfor %}
            {{ ns.found if ns.found else 'unknown' }}
          {% endif %}
