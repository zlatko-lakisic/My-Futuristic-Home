# Top 10 processes on the NVR (Glances processlist API) for the infrastructure dashboard.
#
# Uses command_line + a small Python helper. The modern HA `rest:` sensor does NOT
# support `json_attributes_template` (only fixed json_attributes keys on dict responses),
# so a plain REST YAML cannot attach a computed process list when Glances returns a JSON array.
#
# Files on the HA host (same folder):
#   - nvr_top_processes.yaml (this file)
#   - nvr_glances_top_processes.py (fetch + sort; edit URL inside if needed)
#   - nvr_glances_ip.py (IPv4 for enp3s0 / enp4s0 / br-9229c4b7924f; edit BASE if Glances host differs)
#
# Include from configuration.yaml:
#   homeassistant:
#     packages:
#       nvr_top_processes: !include packages/nvr_top_processes.yaml
#
# After changes: Developer tools → YAML → Reload all YAML configuration (or restart).
#
# Manual test: the Terminal / SSH *add-on* often has no Python (`python3: not found`).
# The command_line sensor runs inside the *Home Assistant Core* container, where Python
# lives at /usr/local/bin/python3. To test from the host: docker exec homeassistant
# /usr/local/bin/python3 /config/packages/nvr_glances_top_processes.py

template:
  - sensor:
    - platform: command_line
      name: NVR Glances top processes
      unique_id: nvr_glances_top_processes
      icon: mdi:format-list-numbered
      scan_interval: 60
      command: /usr/local/bin/python3 /config/packages/nvr_glances_top_processes.py
      value_template: "{{ value_json.count | default(0) | int }}"
      json_attributes:
        - processes
        - processes_json

    - platform: command_line
      name: NVR Glances NIC IPv4
      unique_id: nvr_glances_nic_ipv4_map
      icon: mdi:ip-network
      scan_interval: 120
      command: /usr/local/bin/python3 /config/packages/nvr_glances_ip.py
      value_template: "{{ value_json.enp3s0 | default('—') }}"
      json_attributes:
        - enp3s0
        - enp4s0
        - br_9229c4b7924f
