views:
  - title: Backyard Overview
    path: backyard
    type: sections
    max_columns: 4
    dense_section_placement: true
    icon: mdi:home
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: SURVEILLANCE & SECURITY
          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 30% 70%
              grid-template-rows: 1fr
              place-items: stretch
              mediaquery:
                "(max-width: 900px)":
                  grid-template-columns: 100%
            cards:
              - square: false
                type: grid
                cards:
                  - type: custom:advanced-camera-card
                    cameras:
                      - camera_entity: camera.back_yard
                        dimensions:
                          layout:
                            fit: cover
                            position:
                              x: 50
                              'y': 50
                    dimensions:
                      aspect_ratio_mode: static
                      aspect_ratio: '16:7'
                    live:
                      preload: false
                    status_bar:
                      position: top
                      popup_seconds: 60
                      style: overlay
                      height: 30
                    menu:
                      style: none
                  - type: custom:layout-card
                    layout_type: custom:grid-layout
                    layout:
                      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr))
                      grid-gap: 8px
                      place-items: stretch
                    cards:
                      - type: custom:button-card
                        entity: sensor.back_yard_person_count
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        tap_action:
                          action: navigate
                          navigation_path: /dashboard-backyard/backyard-frigate-people
                        hold_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 8px 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"stat_tile"'
                            - grid-template-columns: 1fr
                          custom_fields:
                            stat_tile:
                              - width: 100%
                              - min-width: 0
                              - justify-self: stretch
                        custom_fields:
                          stat_tile: |
                            [[[
                              const st = hass.states[entity.entity_id];
                              const raw = st.state;
                              const low = String(raw).toLowerCase();
                              let n = Number(raw);
                              if (['unknown', 'unavailable'].includes(low) || raw === '') n = 0;
                              if (Number.isNaN(n) || !Number.isFinite(n)) n = 0;
                              const label = (n === 1) ? '1 Person' : `${n} People`;
                              const iconColor = '#43a047';
                              return `<div style="display:flex;flex-direction:row;align-items:center;gap:10px;width:100%;min-width:0;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);">
                                <ha-icon icon="mdi:account-multiple" style="flex-shrink:0;color:${iconColor};--mdc-icon-size:30px;width:30px;height:30px;"></ha-icon>
                                <div style="font-weight:700;font-size:0.875rem;line-height:1.25;color:#fff;min-width:0;flex:1 1 auto;text-align:left;word-wrap:break-word;overflow-wrap:anywhere;">${label}</div>
                              </div>`;
                            ]]]
                      - type: custom:button-card
                        entity: sensor.back_yard_dog_count
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        tap_action:
                          action: navigate
                          navigation_path: /dashboard-backyard/backyard-frigate-dogs
                        hold_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 8px 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"stat_tile"'
                            - grid-template-columns: 1fr
                          custom_fields:
                            stat_tile:
                              - width: 100%
                              - min-width: 0
                              - justify-self: stretch
                        custom_fields:
                          stat_tile: |
                            [[[
                              const st = hass.states[entity.entity_id];
                              const raw = st.state;
                              const low = String(raw).toLowerCase();
                              let n = Number(raw);
                              if (['unknown', 'unavailable'].includes(low) || raw === '') n = 0;
                              if (Number.isNaN(n) || !Number.isFinite(n)) n = 0;
                              const label = (n === 1) ? '1 Dog Detected' : `${n} Dogs Detected`;
                              const iconColor = '#fdd835';
                              return `<div style="display:flex;flex-direction:row;align-items:center;gap:10px;width:100%;min-width:0;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);">
                                <ha-icon icon="mdi:dog-side" style="flex-shrink:0;color:${iconColor};--mdc-icon-size:30px;width:30px;height:30px;"></ha-icon>
                                <div style="font-weight:700;font-size:0.875rem;line-height:1.25;color:#fff;min-width:0;flex:1 1 auto;text-align:left;word-wrap:break-word;overflow-wrap:anywhere;">${label}</div>
                              </div>`;
                            ]]]
                      - type: custom:button-card
                        entity: sensor.back_yard_last_recognized_face
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        tap_action:
                          action: navigate
                          navigation_path: /dashboard-backyard/backyard-frigate-faces
                        hold_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 8px 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"stat_tile"'
                            - grid-template-columns: 1fr
                          custom_fields:
                            stat_tile:
                              - width: 100%
                              - min-width: 0
                              - justify-self: stretch
                        custom_fields:
                          stat_tile: |
                            [[[
                              const st = hass.states[entity.entity_id];
                              const raw = st.state;
                              const low = String(raw).toLowerCase();
                              const faceBad = ['unknown', 'unavailable', 'none', ''].includes(low);
                              const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
                              const label = faceBad ? 'Facial Match: Unknown' : `Facial Match: ${esc(raw)}`;
                              const iconColor = '#ff6e40';
                              return `<div style="display:flex;flex-direction:row;align-items:center;gap:10px;width:100%;min-width:0;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);">
                                <ha-icon icon="mdi:face-recognition" style="flex-shrink:0;color:${iconColor};--mdc-icon-size:30px;width:30px;height:30px;"></ha-icon>
                                <div style="font-weight:700;font-size:0.875rem;line-height:1.25;color:#fff;min-width:0;flex:1 1 auto;text-align:left;word-wrap:break-word;overflow-wrap:anywhere;">${label}</div>
                              </div>`;
                            ]]]
                columns: 1
              - type: vertical-stack
                cards:
                  - type: custom:layout-card
                    layout_type: custom:grid-layout
                    layout:
