views:
  - title: Backyard Overview
    path: backyard
    type: sections
    max_columns: 4
    icon: mdi:home
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: SURVEILLANCE & SECURITY
          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 30% 70%
              grid-template-rows: 1fr
              place-items: stretch
            cards:
              - square: false
                type: grid
                cards:
                  - type: custom:advanced-camera-card
                    cameras:
                      - camera_entity: camera.back_yard
                        dimensions:
                          layout:
                            fit: cover
                            position:
                              x: 50
                              'y': 50
                    dimensions:
                      aspect_ratio_mode: static
                      aspect_ratio: '16:7'
                    live:
                      preload: false
                    status_bar:
                      position: top
                      popup_seconds: 60
                      style: overlay
                      height: 30
                    menu:
                      style: none
                  - square: false
                    type: grid
                    columns: 3
                    cards:
                      - type: tile
                        entity: sensor.back_yard_person_count
                        icon: mdi:account-multiple
                        color: green
                        vertical: true
                        features_position: bottom
                      - type: tile
                        entity: sensor.back_yard_dog_count
                        icon: mdi:dog-side
                        color: amber
                        vertical: true
                        features_position: bottom
                      - type: tile
                        entity: sensor.back_yard_last_recognized_face
                        icon: mdi:face-recognition
                        color: deep-orange
                        vertical: true
                        features_position: bottom
                columns: 1
              - type: vertical-stack
                cards:
                  - square: false
                    type: grid
                    cards:
                      - type: custom:advanced-camera-card
                        cameras:
                          - camera_entity: camera.east_side
                            dimensions:
                              layout:
                                fit: cover
                                position:
                                  x: 50
                                  'y': 50
                        live:
                          preload: false
                        dimensions:
                          aspect_ratio_mode: static
                          aspect_ratio: '4:3'
                        status_bar:
                          style: overlay
                          position: bottom
                          popup_seconds: 60
                      - type: custom:advanced-camera-card
                        cameras:
                          - camera_entity: camera.west_side
                            dimensions:
                              layout:
                                fit: cover
                                position:
                                  x: 50
                                  'y': 50
                        live:
                          preload: false
                        dimensions:
                          aspect_ratio_mode: static
                          aspect_ratio: '4:3'
                        status_bar:
                          style: overlay
                          position: bottom
                          popup_seconds: 60
                      - type: custom:advanced-camera-card
                        cameras:
                          - camera_entity: camera.garden_south
                            dimensions:
                              layout:
                                fit: cover
                                position:
                                  x: 50
                                  'y': 50
                        live:
                          preload: false
                        dimensions:
                          aspect_ratio_mode: static
                          aspect_ratio: '4:3'
                        status_bar:
                          style: overlay
                          position: bottom
                          popup_seconds: 60
                      - type: custom:advanced-camera-card
                        cameras:
                          - camera_entity: camera.garden_north
                            dimensions:
                              layout:
                                fit: cover
                                position:
                                  x: 50
                                  'y': 50
                        live:
                          preload: false
                        dimensions:
                          aspect_ratio_mode: static
                          aspect_ratio: '4:3'
                        status_bar:
                          style: overlay
                          position: bottom
                          popup_seconds: 60
                    columns: 4
                  - square: false
                    type: grid
                    cards:
                      - type: tile
                        entity: binary_sensor.east_side_door_door
                        name: East Gate
                        color: green
                        vertical: true
                        features_position: bottom
                      - type: tile
                        entity: binary_sensor.west_side_door_door
                        name: West Gate
                        color: green
                        vertical: true
                        features_position: bottom
                      - type: tile
                        entity: binary_sensor.fence_gate_door
                        name: Back Gate
                        color: red
                        vertical: true
                        features_position: bottom
                    columns: 3
            grid_options:
              columns: full
        column_span: 4
      - type: grid
        cards:
          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 30% 70%
            grid_options:
              columns: full
            cards:
              - type: custom:layout-card
                layout_type: custom:vertical-layout
                layout: {}
                cards:
                  - square: false
                    type: grid
                    columns: 2
                    title: ENVIRONMENTS & SOIL
                    cards:
                      - type: custom:modern-circular-gauge
                        entity: sensor.garden_controller_indoor_temperature
                        gauge_type: standard
                        needle: true
                        smooth_segments: true
                        min: -10
                        max: 110
                        show_icon: true
                        icon: mdi:thermometer
                        header_position: top
                        show_header: false
                        state_font_size: 30
                        gauge_background_style:
                          width: 10
                          opacity: 0.7
                        gauge_foreground_style:
                          width: 8
                          color: adaptive
                        adaptive_icon_color: true
                        segments:
                          - from: -10
                            color:
                              - 27
                              - 94
                              - 32
                          - from: 32
                            color:
                              - 67
                              - 160
                              - 71
                          - from: 55
                            color:
                              - 253
                              - 216
                              - 53
                          - from: 72
                            color:
                              - 251
                              - 140
                              - 0
                          - from: 88
                            color:
                              - 198
                              - 40
                              - 40
                        secondary:
                          entity: >-
                            {% set d =
                            states('sensor.garden_controller_dew_point') %} {%
                            if d not in ['unknown', 'unavailable', 'none'] %}
                            DEWPOINT: {{ d }}°F {% endif %}
                        tap_action:
                          action: more-info
                        adaptive_state_color: false
                        adaptive_label_color: false
                        inverted_mode: false
                        name: TEMP
                        show_entity_picture: false
                      - type: custom:modern-circular-gauge
                        entity: sensor.garden_controller_indoor_humidity
                        name: HUMIDITY
                        gauge_type: standard
                        needle: true
                        smooth_segments: true
                        min: 0
                        max: 100
                        show_icon: true
                        icon: mdi:water-percent
                        header_position: top
                        show_header: false
                        state_font_size: 30
                        gauge_background_style:
                          width: 10
                          opacity: 0.7
                        gauge_foreground_style:
                          width: 8
                          color: adaptive
                        adaptive_icon_color: true
                        segments:
                          - from: 0
                            color:
                              - 13
                              - 71
                              - 161
                          - from: 28
                            color:
                              - 21
                              - 101
                              - 192
                          - from: 45
                            color:
                              - 30
                              - 136
                              - 229
                          - from: 62
                            color:
                              - 66
                              - 165
                              - 245
                          - from: 78
                            color:
                              - 255
                              - 179
                              - 0
                        secondary:
                          entity: >-
