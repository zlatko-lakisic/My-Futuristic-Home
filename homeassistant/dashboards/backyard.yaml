  - title: AP Back Yard - UniFi Clients
    path: backyard-unifi-clients
    icon: mdi:wifi
    subview: true
    back_path: /dashboard-backyard
    cards:
      - type: markdown
        content: >
          **Clients on AP Back Yard** — `device_tracker` rows whose UniFi `ap_mac` matches the MAC(s) on the same
          **device** as `sensor.ap_back_yard_clients` (the AP’s own `device_tracker` / `mac` attribute).
          If the list is empty, open **Developer tools → States**, pick any client on that AP, and confirm `ap_mac`
          matches an attribute on one of the AP device’s entities.
      - type: custom:auto-entities
        card:
          type: entities
          title: AP Back Yard clients
          show_header_toggle: false
        filter:
          template: |
            {% set dev_id = device_id('sensor.ap_back_yard_clients') %}
            {% set mac_norms = namespace(l=[]) %}
            {% if dev_id is not none %}
              {% for ent in device_entities(dev_id) %}
                {% if ent.startswith('device_tracker.') %}
                  {% set raw = state_attr(ent, 'mac') or state_attr(ent, 'mac_address') %}
                  {% if raw %}
                    {% set mac_norms.l = mac_norms.l + [raw | lower | replace(':', '') | replace('-', '')] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% set out = namespace(ids=[]) %}
            {% if mac_norms.l | length > 0 %}
              {% for s in states.device_tracker %}
                {% set ap = s.attributes.get('ap_mac') %}
                {% if ap %}
                  {% set apn = ap | lower | replace(':', '') | replace('-', '') %}
                  {% if apn in mac_norms.l %}
                    {% set out.ids = out.ids + [s.entity_id] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {{ out.ids }}
        sort:
          method: name
          ignore_case: true
        show_empty: true

  - title: Back Yard — People
    path: backyard-frigate-people
    icon: mdi:account-multiple
    subview: true
    back_path: /dashboard-backyard/backyard
    cards:
      - type: markdown
        content: >
          **Back Yard** live view and Frigate **person** events. Use the camera card menu (⋮) to open clips / snapshots /
          timeline if the default view is live only. If `image.back_yard_person` is missing, confirm Frigate labels and
          entity names under **Settings → Devices** for this camera.
      - type: custom:advanced-camera-card
        cameras:
          - camera_entity: camera.back_yard
            frigate:
              camera_name: back_yard
              labels:
                - person
            dimensions:
              layout:
                fit: cover
                position:
                  x: 50
                  'y': 50
        dimensions:
          aspect_ratio_mode: static
          aspect_ratio: '16/9'
        live:
          preload: false
        menu:
          style: outside
          position: top
      - type: entities
        title: Latest person crop (Frigate image entity)
        show_header_toggle: false
        entities:
          - entity: image.back_yard_person
            name: Most recent person detection

  - title: Back Yard — Dogs
    path: backyard-frigate-dogs
    icon: mdi:dog-side
    subview: true
