          **Face recognition** depends on your stack: Frigate native **face** objects use the `face` label below. If you
          use **Double Take** or only `person` detections, change `labels` in YAML (e.g. to `person`) or bind different
          image entities in the list at the bottom.
      - type: custom:advanced-camera-card
        cameras:
          - camera_entity: camera.back_yard
            frigate:
              camera_name: back_yard
              labels:
                - face
            dimensions:
