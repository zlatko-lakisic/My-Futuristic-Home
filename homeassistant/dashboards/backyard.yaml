                            - grid-template-columns: 1fr
                          custom_fields:
                            gate_cell:
                              - width: 100%
                              - justify-self: stretch
                        custom_fields:
                          gate_cell: |
                            [[[
                              const st = hass.states[entity.entity_id];
                              const s = st.state;
                              const closed = (s === 'off');
                              const bad = ['unknown', 'unavailable'].includes(s);
                              const statusText = bad ? s : (closed ? 'Closed' : 'Open');
                              const statusColor = bad ? 'rgba(255,255,255,0.5)' : (closed ? '#4caf50' : '#f44336');
