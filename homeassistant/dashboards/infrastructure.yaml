                        show_state: false
                        show_label: false
                        triggers_update:
                          - sensor.nas2_filesystem_2
                          - sensor.nas2_disk
                          - sensor.nas2_disk_2
                          - sensor.nas2_disk_3
                          - sensor.nas2_disk_4
                          - sensor.nas2_disk_5
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 12px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"nas"'
                          custom_fields:
                            nas:
                              - width: 100%
                        custom_fields:
                          nas: |
                            [[[
                              const fsMd0 = hass.states['sensor.nas2_filesystem'];
                              const fsOs = hass.states['sensor.nas2_filesystem_2'];
                              const a = Math.min(100, Math.max(0, parseFloat(fsMd0?.state) || 0));
                              const b = Math.min(100, Math.max(0, parseFloat(fsOs?.state) || 0));
                              const diskIds = ['sensor.nas2_disk','sensor.nas2_disk_2','sensor.nas2_disk_3','sensor.nas2_disk_4','sensor.nas2_disk_5'];
                              let maxT = null;
                              let smartBad = false;
                              for (const id of diskIds) {
                                const st = hass.states[id];
                                if (!st || ['unknown','unavailable'].includes(st.state)) continue;
                                const temp = parseFloat(st.state);
                                if (!Number.isNaN(temp)) maxT = maxT === null ? temp : Math.max(maxT, temp);
                                const r = st.attributes?.reallocated_sector_ct;
                                if (r !== undefined && r !== null && String(r).toLowerCase() !== 'unknown') {
                                  const n = parseFloat(r);
                                  if (!Number.isNaN(n) && n > 0) smartBad = true;
                                }
                              }
                              const t = maxT !== null ? `${maxT}°C max` : '—';
                              const smTxt = smartBad ? 'SMART: Check' : 'SMART: OK';
                              const smCol = smartBad ? '#e57373' : '#81c784';
                              return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;">
                                <div style="font-weight:600;font-size:0.9rem;margin-bottom:2px;">NAS2 (OMV)</div>
                                <div style="font-size:0.68rem;opacity:0.75;margin-bottom:8px;">md0 + sde1 · nas2.mostardesigns.com</div>
                                <div style="display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:8px;">
                                  <div style="width:${a}%;background:#29b6f6;"></div>
                                  <div style="width:${b}%;background:#26a69a;"></div>
                                </div>
                                <div style="display:flex;justify-content:space-between;font-size:0.72rem;opacity:0.85;">
                                  <span style="color:${smCol};font-weight:600;">${smTxt}</span>
                                  <span>Temp: ${t}</span>
                                </div>
                              </div>`;
                            ]]]
