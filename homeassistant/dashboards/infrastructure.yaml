                            `<div>Light <span style="color:#81c784;font-weight:600;">${lightStr}</span></div>` +
                            `<div style="margin-top:3px;">Sound <span style="color:#81c784;font-weight:600;">${soundStr}</span></div>` +
                            `<div style="margin-top:3px;">Stream <span style="color:${idleHue};font-weight:600;">${idleStr}</span></div></div>` +
                            `${netRow}</div>`;
