                    heading_style: subtitle
                    heading: Network storage (OMV)
                  - type: custom:button-card
                    entity: sensor.nas1_system_cpu_load
                    show_icon: false
                    show_name: false
                    show_state: false
                    show_label: false
                    triggers_update:
                      - binary_sensor.nas1_services_docker_service_2
                      - binary_sensor.nas1_services_smb_cifs_service_2
                      - binary_sensor.nas1_services_ssh_service_2
                    styles:
                      card:
                        - background-color: '#1c1c1c'
                        - border: 1px solid rgba(255, 255, 255, 0.1)
                        - border-radius: 14px
                        - padding: 12px
                        - box-shadow: none
                      grid:
                        - grid-template-areas: '"nas"'
                      custom_fields:
                        nas:
                          - width: 100%
                    custom_fields:
                      nas: |
                        [[[
                          const raw = hass.states['sensor.nas1_system_cpu_load']?.state;
                          const cpu = ['unknown', 'unavailable', undefined, null].includes(raw) ? null : Math.min(100, Math.max(0, parseFloat(raw) || 0));
                          const svc = (id) => hass.states[id]?.state === 'on';
                          const docker = svc('binary_sensor.nas1_services_docker_service_2');
                          const smb = svc('binary_sensor.nas1_services_smb_cifs_service_2');
                          const ssh = svc('binary_sensor.nas1_services_ssh_service_2');
                          const pill = (on, label) => `<span style="font-size:0.68rem;font-weight:600;padding:3px 8px;border-radius:6px;background:${on ? 'rgba(76,175,80,0.2)' : 'rgba(244,67,54,0.15)'};color:${on ? '#81c784' : '#e57373'};">${label}</span>`;
                          const bar = cpu != null ? `<div style="margin-bottom:10px;font-family:var(--ha-font-family,sans-serif);color:#fff;">
                            <div style="display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:4px;"><span>CPU load</span><span>${cpu}%</span></div>
                            <div style="height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">
                              <div style="width:${cpu}%;height:100%;background:linear-gradient(90deg,#42a5f5,#1e88e5);"></div>
                            </div>
                          </div>` : `<div style="font-size:0.75rem;opacity:0.75;margin-bottom:10px;">CPU: — (integration unavailable)</div>`;
                          return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;">
                            <div style="font-weight:600;font-size:0.9rem;margin-bottom:8px;">NAS1 (OMV)</div>
                            ${bar}
                            <div style="display:flex;flex-wrap:wrap;gap:6px;">${pill(docker, 'Docker')}${pill(smb, 'SMB')}${pill(ssh, 'SSH')}</div>
                          </div>`;
                        ]]]
                  - type: custom:button-card
                    entity: sensor.nas2_filesystem
                    show_icon: false
                    show_name: false
                    show_state: false
                    show_label: false
                    triggers_update:
                      - sensor.nas2_filesystem_2
                      - sensor.nas2_disk
                      - sensor.nas2_disk_2
                      - sensor.nas2_disk_3
                      - sensor.nas2_disk_4
                      - sensor.nas2_disk_5
                    styles:
                      card:
                        - background-color: '#1c1c1c'
                        - border: 1px solid rgba(255, 255, 255, 0.1)
                        - border-radius: 14px
                        - padding: 12px
                        - box-shadow: none
                      grid:
                        - grid-template-areas: '"nas"'
                      custom_fields:
                        nas:
                          - width: 100%
                    custom_fields:
                      nas: |
                        [[[
                          const fsMd0 = hass.states['sensor.nas2_filesystem'];
                          const fsOs = hass.states['sensor.nas2_filesystem_2'];
                          const a = Math.min(100, Math.max(0, parseFloat(fsMd0?.state) || 0));
                          const b = Math.min(100, Math.max(0, parseFloat(fsOs?.state) || 0));
                          const diskIds = ['sensor.nas2_disk','sensor.nas2_disk_2','sensor.nas2_disk_3','sensor.nas2_disk_4','sensor.nas2_disk_5'];
                          let maxT = null;
                          let smartBad = false;
                          for (const id of diskIds) {
                            const st = hass.states[id];
                            if (!st || ['unknown','unavailable'].includes(st.state)) continue;
                            const temp = parseFloat(st.state);
                            if (!Number.isNaN(temp)) maxT = maxT === null ? temp : Math.max(maxT, temp);
                            const r = st.attributes?.reallocated_sector_ct;
                            if (r !== undefined && r !== null && String(r).toLowerCase() !== 'unknown') {
                              const n = parseFloat(r);
                              if (!Number.isNaN(n) && n > 0) smartBad = true;
                            }
                          }
                          const t = maxT !== null ? `${maxT}°C max` : '—';
                          const smTxt = smartBad ? 'SMART: Check' : 'SMART: OK';
                          const smCol = smartBad ? '#e57373' : '#81c784';
                          return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;">
                            <div style="font-weight:600;font-size:0.9rem;margin-bottom:2px;">NAS2 (OMV)</div>
                            <div style="font-size:0.68rem;opacity:0.75;margin-bottom:8px;">md0 + sde1 · nas2.mostardesigns.com</div>
                            <div style="display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:8px;">
                              <div style="width:${a}%;background:#29b6f6;"></div>
                              <div style="width:${b}%;background:#26a69a;"></div>
                            </div>
                            <div style="display:flex;justify-content:space-between;font-size:0.72rem;opacity:0.85;">
                              <span style="color:${smCol};font-weight:600;">${smTxt}</span>
                              <span>Temp: ${t}</span>
                            </div>
                          </div>`;
                        ]]]

