                            ${row('mdi:download', 'Radarr', 'sensor.nas2_compose_2', '#66bb6a')}
                            ${row('mdi:television-classic', 'Sonarr', 'sensor.nas2_compose_4', '#42a5f5')}
                            ${row('mdi:network', 'qBittorrent', 'sensor.nas2_compose_5', '#ef5350')}
                          </div>`;
                        ]]]
