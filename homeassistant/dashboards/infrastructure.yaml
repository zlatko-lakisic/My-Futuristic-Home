                          const S = (x) => `sensor.${slug}_${x}`;
                          const B = (x) => `binary_sensor.${slug}_${x}`;
                          const W = (x) => `switch.${slug}_${x}`;
                          const st = (id) => hass.states[id];
                          const bad = (e) => !e || ['unavailable', 'unknown', 'none', ''].includes(String(e.state).toLowerCase());
                          const online = !bad(st(entity.entity_id));
                          const recOn = st(W('recordings'))?.state === 'on';
                          const detOn = st(W('detect'))?.state === 'on';
                          const fmtRate = (e) => {
                            if (bad(e)) return '—';
                            const u = e.attributes.unit_of_measurement || '';
                            return esc(String(e.state) + (u ? ` ${u}` : ''));
                          };
                          const rx2 = st(S('rx_2'));
                          const tx2 = st(S('tx_2'));
                          const rx0 = st(S('rx'));
                          const tx0 = st(S('tx'));
                          const rx = !bad(rx2) ? rx2 : rx0;
                          const tx = !bad(tx2) ? tx2 : tx0;
                          const netLines = `<div style="margin-top:2px;font-size:0.5rem;opacity:0.82;line-height:1.35;text-align:left;width:100%;">` +
                            `<div><span style="opacity:0.7">RX </span><span style="font-weight:600;">${fmtRate(rx)}</span></div>` +
                            `<div style="margin-top:2px;"><span style="opacity:0.7">TX </span><span style="font-weight:600;">${fmtRate(tx)}</span></div></div>`;
                          const dayNight = st(B('daynight_1'));
                          let lightStr = '—';
                          if (!bad(dayNight)) {
                            const dc = dayNight.attributes?.device_class;
                            const on = dayNight.state === 'on';
                            if (dc === 'light') lightStr = on ? 'Light (bright)' : 'Low light';
                            else lightStr = on ? 'Night / IR on' : 'Daylight';
                          }
                          const soundLvl = st(S('sound_level'));
                          const soundEvt = st(B('sound_1'));
                          let soundStr = '—';
                          if (!bad(soundEvt)) {
                            soundStr = soundEvt.state === 'on' ? 'Detected' : 'Quiet';
                            if (!bad(soundLvl)) {
                              const su = soundLvl.attributes.unit_of_measurement || '';
                              soundStr += ` (${esc(String(soundLvl.state))}${su ? esc(` ${su}`) : ''})`;
                            }
                          } else if (!bad(soundLvl)) {
