views:
  - title: TOTAL INFRASTRUCTURE MONITORING
    path: infrastructure
    type: sections
    max_columns: 4
    dense_section_placement: true
    icon: mdi:server-network
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: CORE NETWORK STATUS
          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 30% 70%
              grid-template-rows: 1fr
              grid-gap: 10px
              place-items: stretch
              mediaquery:
                '(max-width: 1000px)':
                  grid-template-columns: 100%
            grid_options:
              columns: full
            cards:
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: custom:button-card
                        entity: binary_sensor.mikrotik_home_ether1_connection
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 12px
                            - box-sizing: border-box
                            - height: 140px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                            - grid-template-columns: 1fr
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              const routerImg = '/local/mikrotik-hap-router.png';
                              return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;gap:6px;height:100%;">
                                <div>
                                  <div style="font-weight:700;font-size:0.9rem;line-height:1.15;">MikroTik Basement</div>
                                  <div style="font-size:0.68rem;opacity:0.75;margin-top:2px;">Main gateway</div>
                                </div>
                                <div style="width:100%;display:flex;justify-content:center;align-items:flex-end;flex:1;">
                                  <img src="${routerImg}" alt="MikroTik hAP" style="width:118px;height:auto;object-fit:contain;" loading="lazy" />
                                </div>
                              </div>`;
                            ]]]
                      - type: custom:button-card
                        entity: binary_sensor.mikrotik_home_ether1_connection
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        triggers_update:
                          - update.mikrotik_home_hap_ac_routeros_update
                          - sensor.mikrotik_home_hap_ac_uptime
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 12px
                            - box-sizing: border-box
                            - height: 140px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                            - grid-template-columns: 1fr
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              const st = entity.state;
                              const bad = ['unknown', 'unavailable'].includes(st);
                              const online = st === 'on';
                              const upd = hass.states['update.mikrotik_home_hap_ac_routeros_update'];
                              const fw = upd?.attributes?.installed_version ?? upd?.state ?? '—';
                              const formatUptime = (iso) => {
                                if (!iso || ['unknown', 'unavailable', 'none', ''].includes(String(iso).toLowerCase())) return '—';
                                const t = new Date(iso).getTime();
                                if (Number.isNaN(t)) return iso;
                                let sec = Math.floor((Date.now() - t) / 1000);
                                if (sec < 0) sec = 0;
                                const d = Math.floor(sec / 86400);
                                const h = Math.floor((sec % 86400) / 3600);
                                const m = Math.floor((sec % 3600) / 60);
                                if (d > 0) return `${d}d ${h}h`;
                                if (h > 0) return `${h}h ${m}m`;
                                return `${m}m`;
                              };
                              const up = formatUptime(hass.states['sensor.mikrotik_home_hap_ac_uptime']?.state);
                              const onlinePill = bad
                                ? 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);'
                                : (online
                                  ? 'background:rgba(46,125,50,0.55);color:#c8e6c9;'
                                  : 'background:rgba(198,40,40,0.45);color:#ffcdd2;');
                              const onlineText = bad ? 'Gateway —' : (online ? 'Gateway Online' : 'Gateway Offline');
                              const pill = 'display:flex;align-items:center;justify-content:center;min-height:28px;padding:4px 10px;border-radius:999px;font-size:0.72rem;font-weight:700;border:1px solid rgba(255,255,255,0.08);';
                              return `<div style="font-family:var(--ha-font-family,sans-serif);display:flex;flex-direction:column;gap:8px;justify-content:center;height:100%;">
                                <span style="${pill}${onlinePill}">${onlineText}</span>
                                <span style="${pill}background:#2d2d2d;color:#eeeeee;">F/W: ${fw}</span>
                                <span style="${pill}background:#2d2d2d;color:#eeeeee;">Uptime: ${up}</span>
                              </div>`;
                            ]]]
                  - type: horizontal-stack
                    cards:
                      - type: custom:modern-circular-gauge
                        entity: sensor.mikrotik_home_hap_ac_cpu_load
                        secondary: {}
                      - type: custom:modern-circular-gauge
                        entity: sensor.mikrotik_home_hap_ac_memory_usage
                        secondary: {}
              - type: vertical-stack
                cards:
                  - type: custom:layout-card
                    layout_type: custom:grid-layout
                    layout:
                      grid-template-columns: repeat(5, minmax(0, 1fr))
                      grid-gap: 8px
                      mediaquery:
                        '(max-width: 1600px)':
                          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))
                        '(max-width: 520px)':
                          grid-template-columns: 100%
                    cards:
                      - type: custom:button-card
                        entity: sensor.mikrotik_mostar_rb951g_2hnd_cpu_load
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        triggers_update:
                          - binary_sensor.mikrotik_mostar_ether1_connection
                          - sensor.mikrotik_mostar_rb951g_2hnd_memory_usage
                          - sensor.mikrotik_mostar_ether1_rx
                          - sensor.mikrotik_mostar_ether1_tx
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#121212'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-sizing: border-box
                            - height: 140px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              var wan = hass.states['binary_sensor.mikrotik_mostar_ether1_connection'];
                              var st = wan ? wan.state : 'unavailable';
                              var bad = st === 'unknown' || st === 'unavailable';
                              var online = st === 'on';
                              var dot = bad ? '<span style="color:#9e9e9e;">●</span>' : (online ? '<span style="color:#81c784;">●</span>' : '<span style="color:#e57373;">●</span>');
                              var lineLbl = bad ? '—' : (online ? 'Online' : 'Offline');
                              var cpuSt = hass.states['sensor.mikrotik_mostar_rb951g_2hnd_cpu_load'];
                              var memSt = hass.states['sensor.mikrotik_mostar_rb951g_2hnd_memory_usage'];
                              var cpu = cpuSt ? parseFloat(cpuSt.state) : NaN;
                              var mem = memSt ? parseFloat(memSt.state) : NaN;
                              if (isNaN(cpu)) cpu = 0;
                              if (isNaN(mem)) mem = 0;
                              cpu = Math.min(100, Math.max(0, cpu));
                              mem = Math.min(100, Math.max(0, mem));
                              var rxSt = hass.states['sensor.mikrotik_mostar_ether1_rx'];
                              var txSt = hass.states['sensor.mikrotik_mostar_ether1_tx'];
                              var rx = (rxSt && rxSt.state) ? parseFloat(rxSt.state) : 0;
                              var tx = (txSt && txSt.state) ? parseFloat(txSt.state) : 0;
                              if (isNaN(rx)) rx = 0;
                              if (isNaN(tx)) tx = 0;
                              var sum = Math.max(0, rx + tx);
                              var capBps = 125000000;
                              var rxPct = capBps > 0 ? Math.min(100, (Math.max(0, rx) / capBps) * 100) : 0;
                              var txPct = capBps > 0 ? Math.min(100, (Math.max(0, tx) / capBps) * 100) : 0;
                              var sumMbps = (sum * 8) / 1000;
                              var rxK = Math.max(0, rx).toFixed(1);
                              var txK = Math.max(0, tx).toFixed(1);
                              function hRow(lbl, pct, fill, valStr) {
                                var p = Math.min(100, Math.max(0, pct));
                                return '<div style="margin-top:5px;display:flex;align-items:center;gap:6px;font-size:0.6rem;">' +
                                  '<span style="opacity:0.72;width:46px;flex-shrink:0;">' + lbl + '</span>' +
                                  '<div style="flex:1;min-width:0;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">' +
                                  '<div style="width:' + p + '%;height:100%;background:' + fill + ';border-radius:3px;"></div></div>' +
                                  '<span style="font-weight:700;min-width:36px;text-align:right;flex-shrink:0;">' + valStr + '</span></div>';
                              }
                              return '<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;width:100%;">' +
                                '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;">' +
                                '<div style="min-width:0;flex:1;"><div style="font-weight:700;font-size:0.82rem;">' + dot + ' Mikrotik-Mostar</div>' +
                                '<div style="font-size:0.65rem;opacity:0.72;margin-top:3px;line-height:1.25;">RB951G · remote · ' + lineLbl + '</div></div>' +
                                '<div style="flex-shrink:0;text-align:right;font-size:0.58rem;opacity:0.65;line-height:1.2;">1 Gbps<br/>100 Mbps</div></div>' +
                                hRow('CPU', cpu, 'linear-gradient(90deg,#ffb74d,#ff9800)', Math.round(cpu) + '%') +
                                hRow('Memory', mem, 'linear-gradient(90deg,#4fc3f7,#29b6f6)', Math.round(mem) + '%') +
                                '<div style="margin-top:6px;font-size:0.58rem;opacity:0.72;">Throughput</div>' +
                                hRow('Download', rxPct, 'linear-gradient(90deg,#66bb6a,#26c6da)', rxK + ' kB/s') +
                                hRow('Upload', txPct, 'linear-gradient(90deg,#ab47bc,#7e57c2)', txK + ' kB/s') +
                                '<div style="font-size:0.55rem;opacity:0.5;margin-top:2px;">Total ' + sumMbps.toFixed(1) + ' Mb/s · vs line rate (WAN)</div></div>';
                            ]]]
                      - type: custom:button-card
                        entity: binary_sensor.mikrotik_home_ether3_connection
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        triggers_update:
                          - sensor.mikrotik_home_ether3_rx
                          - sensor.mikrotik_home_ether3_tx
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#121212'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-sizing: border-box
                            - height: 140px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              var st = entity.state;
                              var bad = st === 'unknown' || st === 'unavailable';
                              var linkUp = st === 'on';
                              var dot = bad ? '<span style="color:#9e9e9e;">●</span>' : (linkUp ? '<span style="color:#81c784;">●</span>' : '<span style="color:#e57373;">●</span>');
                              var lineLbl = bad ? '—' : (linkUp ? 'Online' : 'Offline');
                              var ent = entity;
                              var rateStr = '';
                              if (ent && ent.attributes && ent.attributes.rate != null) rateStr = String(ent.attributes.rate).toLowerCase();
                              var capBps = 125000000;
                              if (rateStr.indexOf('10g') >= 0 || rateStr.indexOf('10000') >= 0) capBps = 1250000000;
                              else if (rateStr.indexOf('100m') >= 0 || rateStr === '100mbps') capBps = 12500000;
                              var rxSt = hass.states['sensor.mikrotik_home_ether3_rx'];
                              var txSt = hass.states['sensor.mikrotik_home_ether3_tx'];
                              var rx = (rxSt && rxSt.state) ? parseFloat(rxSt.state) : 0;
                              var tx = (txSt && txSt.state) ? parseFloat(txSt.state) : 0;
                              if (isNaN(rx)) rx = 0;
                              if (isNaN(tx)) tx = 0;
                              var sum = Math.max(0, rx + tx);
                              var v = capBps > 0 ? Math.min(100, (sum / capBps) * 100) : 0;
                              var rxPct = capBps > 0 ? Math.min(100, (Math.max(0, rx) / capBps) * 100) : 0;
                              var txPct = capBps > 0 ? Math.min(100, (Math.max(0, tx) / capBps) * 100) : 0;
                              var mbps = (sum * 8) / 1000;
                              var kbLabel = sum.toFixed(1) + ' kB/s';
                              var rxShow = (rxSt && rxSt.state != null) ? String(rxSt.state) : '0';
                              var txShow = (txSt && txSt.state != null) ? String(txSt.state) : '0';
                              function hRow(lbl, pct, fill, valStr) {
                                var p = Math.min(100, Math.max(0, pct));
                                return '<div style="margin-top:5px;display:flex;align-items:center;gap:6px;font-size:0.6rem;">' +
                                  '<span style="opacity:0.72;width:46px;flex-shrink:0;">' + lbl + '</span>' +
                                  '<div style="flex:1;min-width:0;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">' +
                                  '<div style="width:' + p + '%;height:100%;background:' + fill + ';border-radius:3px;"></div></div>' +
                                  '<span style="font-weight:700;min-width:36px;text-align:right;flex-shrink:0;">' + valStr + '</span></div>';
                              }
                              return '<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;width:100%;">' +
                                '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;">' +
                                '<div style="min-width:0;flex:1;"><div style="font-weight:700;font-size:0.82rem;">' + dot + ' CSS326 · perimeter</div>' +
                                '<div style="font-size:0.62rem;opacity:0.72;margin-top:3px;line-height:1.25;">SwitchOS · ether3 \u2192 MSNSwitch · ' + lineLbl + '</div></div>' +
                                '<div style="flex-shrink:0;text-align:right;font-size:0.58rem;opacity:0.65;line-height:1.2;">10 Gbps<br/>1 Gbps</div></div>' +
                                hRow('Link', v, 'linear-gradient(90deg,#aed581,#66bb6a)', Math.round(v) + '%') +
                                '<div style="margin-top:6px;font-size:0.58rem;opacity:0.72;">Throughput</div>' +
                                hRow('Download', rxPct, 'linear-gradient(90deg,#42a5f5,#26c6da)', rxShow + ' kB/s') +
                                hRow('Upload', txPct, 'linear-gradient(90deg,#ab47bc,#7e57c2)', txShow + ' kB/s') +
                                '<div style="font-size:0.55rem;opacity:0.5;margin-top:2px;text-align:right;">' + kbLabel + ' · ' + mbps.toFixed(1) + ' Mb/s</div></div>';
                            ]]]
                      - type: custom:button-card
                        entity: sensor.ap_back_yard_clients
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        triggers_update:
                          - sensor.ap_back_yard_cpu_utilization
                          - sensor.ap_back_yard_memory_utilization
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-sizing: border-box
                            - height: 140px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              var cpuSt = hass.states['sensor.ap_back_yard_cpu_utilization'];
                              var memSt = hass.states['sensor.ap_back_yard_memory_utilization'];
                              var cpu = (cpuSt && cpuSt.state != null && cpuSt.state !== 'unknown' && cpuSt.state !== 'unavailable') ? String(cpuSt.state) : '—';
                              var mem = (memSt && memSt.state != null && memSt.state !== 'unknown' && memSt.state !== 'unavailable') ? String(memSt.state) : '—';
                              var cliRaw = (entity && entity.state != null && entity.state !== 'unknown' && entity.state !== 'unavailable') ? String(entity.state) : null;
                              function parsePct(s) {
                                if (s === '—') return { w: 0, t: '—' };
                                var n = parseFloat(String(s).replace('%', ''));
                                if (isNaN(n)) return { w: 0, t: '—' };
                                n = Math.min(100, Math.max(0, n));
                                return { w: n, t: Math.round(n) + '%' };
                              }
                              function parseClients(s) {
                                if (s == null) return { w: 0, t: '—' };
                                var n = parseFloat(String(s));
                                if (isNaN(n)) return { w: 0, t: '—' };
                                n = Math.max(0, n);
                                var w = Math.min(100, n);
                                return { w: w, t: String(Math.round(n)) };
                              }
                              function hRow(lbl, pct, fill, valStr) {
                                var p = Math.min(100, Math.max(0, pct));
                                return '<div style="margin-top:3px;display:flex;align-items:center;gap:6px;font-size:0.58rem;">' +
                                  '<span style="opacity:0.72;width:50px;flex-shrink:0;">' + lbl + '</span>' +
                                  '<div style="flex:1;min-width:0;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">' +
                                  '<div style="width:' + p + '%;height:100%;background:' + fill + ';border-radius:3px;"></div></div>' +
                                  '<span style="font-weight:700;min-width:32px;text-align:right;flex-shrink:0;">' + valStr + '</span></div>';
                              }
                              var cCpu = parsePct(cpu);
                              var cMem = parsePct(mem);
                              var cCli = parseClients(cliRaw);
                              var iconUrl = 'https://raw.githubusercontent.com/cyberconsecurity/Unifi/main/WiFi/PNG/UAP-AC-M.png';
                              return '<div style="width:100%;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);color:#fff;">' +
                                '<div style="display:flex;align-items:flex-start;gap:8px;">' +
                                '<img src="' + iconUrl + '" width="34" height="34" alt="" style="object-fit:contain;flex-shrink:0;" />' +
                                '<div style="min-width:0;flex:1;">' +
                                '<div style="font-weight:600;font-size:0.78rem;">AP Back Yard</div>' +
                                '<div style="font-size:0.62rem;opacity:0.72;margin-top:2px;">U7MSH · UniFi</div></div></div>' +
                                '<div style="margin-top:6px;">' +
                                hRow('CPU', cCpu.w, 'linear-gradient(90deg,#ffb74d,#ff9800)', cCpu.t) +
                                hRow('Mem', cMem.w, 'linear-gradient(90deg,#4fc3f7,#29b6f6)', cMem.t) +
                                hRow('Clients', cCli.w, 'linear-gradient(90deg,#ba68c8,#9c27b0)', cCli.t) +
                                '</div></div>';
                            ]]]
                      - type: custom:button-card
                        entity: sensor.ap_bottom_floor_clients
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        triggers_update:
                          - sensor.ap_bottom_floor_cpu_utilization
                          - sensor.ap_bottom_floor_memory_utilization
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-sizing: border-box
                            - height: 140px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              var cpuSt = hass.states['sensor.ap_bottom_floor_cpu_utilization'];
                              var memSt = hass.states['sensor.ap_bottom_floor_memory_utilization'];
                              var cpu = (cpuSt && cpuSt.state != null && cpuSt.state !== 'unknown' && cpuSt.state !== 'unavailable') ? String(cpuSt.state) : '—';
                              var mem = (memSt && memSt.state != null && memSt.state !== 'unknown' && memSt.state !== 'unavailable') ? String(memSt.state) : '—';
                              var cliRaw = (entity && entity.state != null && entity.state !== 'unknown' && entity.state !== 'unavailable') ? String(entity.state) : null;
                              function parsePct(s) {
                                if (s === '—') return { w: 0, t: '—' };
                                var n = parseFloat(String(s).replace('%', ''));
                                if (isNaN(n)) return { w: 0, t: '—' };
                                n = Math.min(100, Math.max(0, n));
                                return { w: n, t: Math.round(n) + '%' };
                              }
                              function parseClients(s) {
                                if (s == null) return { w: 0, t: '—' };
                                var n = parseFloat(String(s));
                                if (isNaN(n)) return { w: 0, t: '—' };
                                n = Math.max(0, n);
                                var w = Math.min(100, n);
                                return { w: w, t: String(Math.round(n)) };
                              }
                              function hRow(lbl, pct, fill, valStr) {
                                var p = Math.min(100, Math.max(0, pct));
                                return '<div style="margin-top:3px;display:flex;align-items:center;gap:6px;font-size:0.58rem;">' +
                                  '<span style="opacity:0.72;width:50px;flex-shrink:0;">' + lbl + '</span>' +
                                  '<div style="flex:1;min-width:0;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">' +
                                  '<div style="width:' + p + '%;height:100%;background:' + fill + ';border-radius:3px;"></div></div>' +
                                  '<span style="font-weight:700;min-width:32px;text-align:right;flex-shrink:0;">' + valStr + '</span></div>';
                              }
                              var cCpu = parsePct(cpu);
                              var cMem = parsePct(mem);
                              var cCli = parseClients(cliRaw);
                              var iconUrl = 'https://raw.githubusercontent.com/cyberconsecurity/Unifi/main/WiFi/PNG/UAP-AC-LITE.png';
                              return '<div style="width:100%;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);color:#fff;">' +
                                '<div style="display:flex;align-items:flex-start;gap:8px;">' +
                                '<img src="' + iconUrl + '" width="34" height="34" alt="" style="object-fit:contain;flex-shrink:0;" />' +
                                '<div style="min-width:0;flex:1;">' +
