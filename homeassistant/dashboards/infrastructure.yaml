                            `<div style="display:flex;gap:10px;margin-bottom:4px;"><span><span style="color:#42a5f5">━</span> RX</span><span><span style="color:#ffb74d">━</span> TX</span></div>` +
                            `${netLines}</div>`;
                          const leftCol = `<div style="flex:1;min-width:0;display:grid;grid-template-columns:22px minmax(0,1fr);column-gap:10px;row-gap:8px;align-items:center;text-align:left;justify-items:start;">` +
