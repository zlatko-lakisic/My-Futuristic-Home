                            const ok = hass.states[id]?.state === 'running';
                            const v = ok ? 100 : 0;
                            return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:var(--ha-font-family,sans-serif);color:#fff;">
                              <ha-icon icon="${icon}" style="flex-shrink:0;color:${color};--mdc-icon-size:22px;"></ha-icon>
