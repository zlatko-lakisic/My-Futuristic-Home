# -----------------------------------------------------------------------------
# Infrastructure dashboard — entities aligned to live Home Assistant (Mikrotik per-interface
# / per-controller names, UniFi, Proxmox node + QEMU, OMV NAS1/NAS2, System Monitor, Frigate CPU).
# Throughput graphs: Mikrotik kB/s on ether1 / ether2 / VLANs / ether3. UniFi has no
# sensor.ap_bottom_floor_clients — middle AP tile uses CPU utilization.
# -----------------------------------------------------------------------------

views:
  - title: Infrastructure
    path: infrastructure
    type: sections
    max_columns: 4
    dense_section_placement: true
    icon: mdi:server-network
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: TOTAL INFRASTRUCTURE MONITORING

          - type: heading
            heading_style: subtitle
            heading: CORE NETWORK STATUS

          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 34% 1fr
              grid-gap: 10px
              place-items: stretch
              mediaquery:
                "(max-width: 1000px)":
                  grid-template-columns: 100%
            grid_options:
              columns: full
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:button-card
                    entity: binary_sensor.mikrotik_home_ether1_connection
                    show_icon: false
                    show_name: false
                    show_state: false
                    show_label: false
                    triggers_update:
                      - sensor.mikrotik_home_hap_ac_uptime
                      - update.mikrotik_home_hap_ac_routeros_update
                      - sensor.mikrotik_home_hap_ac_cpu_load
                      - sensor.mikrotik_home_hap_ac_memory_usage
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - background-color: '#1c1c1c'
                        - border: 1px solid rgba(255, 255, 255, 0.1)
                        - border-radius: 14px
                        - padding: 12px
                        - box-shadow: none
                      grid:
                        - grid-template-areas: '"gw"'
                        - grid-template-columns: 1fr
                      custom_fields:
                        gw:
                          - width: 100%
                          - justify-self: stretch
                    custom_fields:
                      gw: |
                        [[[
                          const st = entity.state;
                          const bad = ['unknown', 'unavailable'].includes(st);
                          const online = st === 'on';
                          const badgeBg = bad ? 'rgba(255,255,255,0.08)' : (online ? 'rgba(67,160,71,0.2)' : 'rgba(244,67,54,0.2)');
                          const badgeFg = bad ? 'rgba(255,255,255,0.5)' : (online ? '#81c784' : '#ef9a9a');
                          const badgeTxt = bad ? 'WAN status: —' : (online ? 'WAN link up' : 'WAN link down');
                          const formatUptime = (iso) => {
                            if (!iso || ['unknown', 'unavailable', 'none', ''].includes(String(iso).toLowerCase())) return '—';
                            const t = new Date(iso).getTime();
                            if (Number.isNaN(t)) return iso;
                            let sec = Math.floor((Date.now() - t) / 1000);
                            if (sec < 0) sec = 0;
                            const d = Math.floor(sec / 86400);
                            const h = Math.floor((sec % 86400) / 3600);
                            const m = Math.floor((sec % 3600) / 60);
                            if (d > 0) return `${d}d ${h}h`;
                            if (h > 0) return `${h}h ${m}m`;
                            return `${m}m`;
                          };
                          const up = formatUptime(hass.states['sensor.mikrotik_home_hap_ac_uptime']?.state);
                          const upd = hass.states['update.mikrotik_home_hap_ac_routeros_update'];
                          const fw = upd?.attributes?.installed_version ?? upd?.state ?? '—';
                          const cpu = hass.states['sensor.mikrotik_home_hap_ac_cpu_load']?.state ?? '—';
                          const mem = hass.states['sensor.mikrotik_home_hap_ac_memory_usage']?.state ?? '—';
                          return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;width:100%;box-sizing:border-box;">
                            <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;">
                              <ha-icon icon="mdi:router-wireless" style="flex-shrink:0;color:#ff9800;--mdc-icon-size:48px;width:48px;height:48px;"></ha-icon>
                              <div style="min-width:0;flex:1;">
                                <div style="font-weight:700;font-size:1rem;line-height:1.2;">MikroTik hAP ac</div>
                                <div style="font-size:0.72rem;opacity:0.75;margin-top:4px;">Main gateway · 10.0.10.1</div>
                                <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
                                  <span style="font-size:0.72rem;font-weight:600;padding:4px 10px;border-radius:999px;background:${badgeBg};color:${badgeFg};">${badgeTxt}</span>
                                  <span style="font-size:0.72rem;opacity:0.85;padding:4px 8px;border-radius:8px;background:rgba(255,255,255,0.06);">F/W: ${fw}</span>
                                  <span style="font-size:0.72rem;opacity:0.85;padding:4px 8px;border-radius:8px;background:rgba(255,255,255,0.06);">Uptime: ${up}</span>
                                </div>
                              </div>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.8rem;opacity:0.9;">
                              <div>CPU load: <strong style="color:#ffb74d;">${cpu}${String(cpu).includes('%')?'':'%'}</strong></div>
                              <div>Memory: <strong style="color:#4fc3f7;">${mem}${String(mem).includes('%')?'':'%'}</strong></div>
                            </div>
                          </div>`;
                        ]]]
                  - type: custom:layout-card
                    layout_type: custom:grid-layout
                    layout:
                      grid-template-columns: 1fr 1fr
                      grid-gap: 8px
                    cards:
                      - type: custom:modern-circular-gauge
                        entity: sensor.mikrotik_home_hap_ac_cpu_load
                        name: CPU Load
                        gauge_type: standard
                        needle: false
                        smooth_segments: true
                        min: 0
                        max: 100
                        show_icon: true
                        icon: mdi:chip
                        header_position: top
                        show_header: true
                        state_font_size: 22
                        gauge_background_style:
                          width: 12
                          opacity: 0.5
                        gauge_foreground_style:
                          width: 10
                          color:
                            - 255
                            - 152
                            - 0
                        segments:
                          - from: 0
                            color:
                              - 76
                              - 175
                              - 80
                          - from: 55
                            color:
                              - 255
                              - 193
                              - 7
                          - from: 80
                            color:
                              - 244
                              - 67
                              - 54
                        tap_action:
                          action: more-info
                      - type: custom:modern-circular-gauge
                        entity: sensor.mikrotik_home_hap_ac_memory_usage
                        name: Memory
                        gauge_type: standard
                        needle: false
                        smooth_segments: true
                        min: 0
                        max: 100
                        show_icon: true
                        icon: mdi:memory
                        header_position: top
                        show_header: true
                        state_font_size: 22
                        gauge_background_style:
                          width: 12
                          opacity: 0.5
                        gauge_foreground_style:
                          width: 10
                          color:
                            - 79
                            - 195
                            - 247
                        segments:
                          - from: 0
                            color:
                              - 79
                              - 195
                              - 247
                          - from: 50
                            color:
                              - 255
                              - 193
                              - 7
                          - from: 80
                            color:
                              - 244
                              - 67
                              - 54
                        tap_action:
                          action: more-info

              - type: vertical-stack
                cards:
                  - type: custom:layout-card
                    layout_type: custom:grid-layout
                    layout:
                      grid-template-columns: repeat(2, minmax(0, 1fr))
                      grid-gap: 8px
                      mediaquery:
                        "(max-width: 520px)":
                          grid-template-columns: 100%
                    cards:
                      - type: custom:button-card
                        entity: sensor.mikrotik_mostar_rb951g_2hnd_cpu_load
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        triggers_update:
                          - update.mikrotik_mostar_rb951g_2hnd_routeros_update
                          - binary_sensor.mikrotik_mostar_ether1_connection
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                            - grid-template-columns: 1fr
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              const v = Math.min(100, Math.max(0, parseFloat(entity.state) || 0));
                              const upd = hass.states['update.mikrotik_mostar_rb951g_2hnd_routeros_update'];
                              const lbl = upd?.attributes?.installed_version ?? '192.168.88.1';
                              const wan = hass.states['binary_sensor.mikrotik_mostar_ether1_connection']?.state;
                              const wanOk = wan === 'on';
                              const dot = wanOk ? '<span style="color:#81c784;">●</span> ' : '<span style="color:#e57373;">●</span> ';
                              return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;">
                                <div style="font-weight:600;font-size:0.85rem;margin-bottom:2px;">${dot}Mikrotik-Mostar</div>
                                <div style="font-size:0.68rem;opacity:0.75;margin-bottom:6px;">RB951G · remote site</div>
                                <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">
                                  <div style="width:${v}%;height:100%;background:linear-gradient(90deg,#29b6f6,#ff9800);"></div>
                                </div>
                                <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:0.72rem;opacity:0.8;"><span>CPU load</span><span>${lbl}</span></div>
                              </div>`;
                            ]]]
                      - type: custom:button-card
                        entity: binary_sensor.mikrotik_home_ether3_connection
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        triggers_update:
                          - sensor.mikrotik_home_ether3_rx
                          - sensor.mikrotik_home_ether3_tx
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              const st = entity.state;
                              const linkUp = st === 'on';
                              const dot = linkUp ? '<span style="color:#81c784;">●</span> ' : '<span style="color:#e57373;">●</span> ';
                              const attrs = entity.attributes || {};
                              const rateStr = (attrs.rate != null ? String(attrs.rate) : '').toLowerCase();
                              let capBps = 125000000;
                              if (rateStr.includes('10g') || rateStr.includes('10000')) capBps = 1250000000;
                              else if (rateStr.includes('100m') || rateStr.includes('100 m') || rateStr === '100mbps') capBps = 12500000;
                              const rx = parseFloat(hass.states['sensor.mikrotik_home_ether3_rx']?.state) || 0;
                              const tx = parseFloat(hass.states['sensor.mikrotik_home_ether3_tx']?.state) || 0;
                              const sum = Math.max(0, rx + tx);
                              const v = capBps > 0 ? Math.min(100, (sum / capBps) * 100) : 0;
                              const mbps = (sum * 8) / 1000000;
                              const lbl = `${mbps.toFixed(1)} Mbps`;
                              return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;">
                                <div style="font-weight:600;font-size:0.85rem;margin-bottom:2px;">${dot}CSS326 · perimeter</div>
                                <div style="font-size:0.68rem;opacity:0.75;margin-bottom:6px;">hAP ether3 → MSNSwitch</div>
                                <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">
                                  <div style="width:${v}%;height:100%;background:linear-gradient(90deg,#66bb6a,#26c6da);"></div>
                                </div>
                                <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:0.72rem;opacity:0.8;"><span>Uplink vs line rate</span><span>${lbl}</span></div>
                              </div>`;
                            ]]]

                  - type: custom:layout-card
                    layout_type: custom:grid-layout
                    layout:
                      grid-template-columns: repeat(3, minmax(0, 1fr))
                      grid-gap: 8px
                      mediaquery:
                        "(max-width: 900px)":
                          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
                    cards:
                      - type: custom:button-card
                        entity: sensor.ap_back_yard_clients
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              const n = entity.state;
                              const iconUrl = 'https://raw.githubusercontent.com/cyberconsecurity/Unifi/main/WiFi/PNG/UAP-AC-LITE.png';
                              return `<div style="width:100%;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);color:#fff;">
                                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                                  <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                                    <img src="${iconUrl}" width="40" height="40" alt="" style="object-fit:contain;flex-shrink:0;" loading="lazy" />
                                    <div>
                                      <div style="font-weight:600;font-size:0.85rem;">AP Back Yard</div>
                                      <div style="font-size:0.72rem;opacity:0.75;margin-top:2px;">U7MSH · UniFi</div>
                                    </div>
                                  </div>
                                  <div style="font-size:1.35rem;font-weight:700;">${n}</div>
                                </div>
                                <div style="font-size:0.72rem;opacity:0.75;margin-top:6px;text-align:right;">clients</div>
                              </div>`;
                            ]]]
                      - type: custom:button-card
                        entity: sensor.ap_bottom_floor_cpu_utilization
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              const n = entity.state;
                              const iconUrl = 'https://raw.githubusercontent.com/cyberconsecurity/Unifi/main/WiFi/PNG/UAP-AC-LITE.png';
                              return `<div style="width:100%;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);color:#fff;">
                                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                                  <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                                    <img src="${iconUrl}" width="40" height="40" alt="" style="object-fit:contain;flex-shrink:0;" loading="lazy" />
                                    <div>
                                      <div style="font-weight:600;font-size:0.85rem;">AP Bottom Floor</div>
                                      <div style="font-size:0.72rem;opacity:0.75;margin-top:2px;">U7NHD · UniFi</div>
                                    </div>
                                  </div>
                                  <div style="font-size:1.35rem;font-weight:700;">${n}<span style="font-size:0.85rem;opacity:0.8">%</span></div>
                                </div>
                                <div style="font-size:0.72rem;opacity:0.75;margin-top:6px;text-align:right;">CPU util. (no clients entity)</div>
                              </div>`;
                            ]]]
                      - type: custom:button-card
                        entity: sensor.ap_top_floor_clients
                        show_icon: false
                        show_name: false
                        show_state: false
                        show_label: false
                        tap_action:
                          action: more-info
                        styles:
                          card:
                            - background-color: '#1c1c1c'
                            - border: 1px solid rgba(255, 255, 255, 0.1)
                            - border-radius: 14px
                            - padding: 10px
                            - box-shadow: none
                          grid:
                            - grid-template-areas: '"r"'
                          custom_fields:
                            r:
                              - width: 100%
                        custom_fields:
                          r: |
                            [[[
                              const n = entity.state;
                              const iconUrl = 'https://raw.githubusercontent.com/cyberconsecurity/Unifi/main/WiFi/PNG/UAP-AC-LITE.png';
                              return `<div style="width:100%;box-sizing:border-box;font-family:var(--ha-font-family,sans-serif);color:#fff;">
                                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                                  <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                                    <img src="${iconUrl}" width="40" height="40" alt="" style="object-fit:contain;flex-shrink:0;" loading="lazy" />
                                    <div>
                                      <div style="font-weight:600;font-size:0.85rem;">AP Top Floor</div>
                                      <div style="font-size:0.72rem;opacity:0.75;margin-top:2px;">U7NHD · UniFi</div>
                                    </div>
                                  </div>
                                  <div style="font-size:1.35rem;font-weight:700;">${n}</div>
                                </div>
                                <div style="font-size:0.72rem;opacity:0.75;margin-top:6px;text-align:right;">clients</div>
                              </div>`;
                            ]]]

                  - type: heading
                    heading_style: subtitle
                    heading: Throughput (recent)

                  - type: custom:layout-card
                    layout_type: custom:grid-layout
                    layout:
                      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr))
                      grid-gap: 8px
                    cards:
                      - type: custom:statistics-graph-chart-card
                        card_header: WAN (ISP)
                        show_grid: false
                        show_tooltip: true
                        show_legend: false
                        show_y_axis: false
                        show_x_axis: true
                        show_x_ticks: false
                        show_y_ticks: false
                        cache: true
                        animate_graph: false
                        hours_to_show: 6
                        points_per_hour: 4
                        height: 100
                        chart_mode: timeline
                        group_by: interval
                        entities:
                          - entity: sensor.mikrotik_home_ether1_rx
                            name: kB/s
                            color: '#ff9800'
                            graph_type: line
                            line_width: 2
                            show_fill: true
                            smooth: true
                            decimals: 0
                            aggregate_func: avg
                            tap_action:
                              action: more-info
                      - type: custom:statistics-graph-chart-card
                        card_header: LAN (Core)
                        show_grid: false
                        show_tooltip: true
                        show_legend: false
                        show_y_axis: false
                        show_x_axis: true
                        show_x_ticks: false
                        show_y_ticks: false
                        cache: true
                        animate_graph: false
                        hours_to_show: 6
                        points_per_hour: 4
                        height: 100
                        chart_mode: timeline
                        group_by: interval
                        entities:
                          - entity: sensor.mikrotik_home_ether2_rx
                            name: kB/s
                            color: '#ffa726'
                            graph_type: line
                            line_width: 2
                            show_fill: true
                            smooth: true
                            decimals: 0
                            aggregate_func: avg
                            tap_action:
                              action: more-info
                      - type: custom:statistics-graph-chart-card
                        card_header: Home WLAN
                        show_grid: false
                        show_tooltip: true
                        show_legend: false
                        show_y_axis: false
                        show_x_axis: true
                        show_x_ticks: false
                        show_y_ticks: false
                        cache: true
                        animate_graph: false
                        hours_to_show: 6
                        points_per_hour: 4
                        height: 100
                        chart_mode: timeline
                        group_by: interval
                        entities:
                          - entity: sensor.mikrotik_home_home_wifi_vlan_rx
                            name: kB/s
                            color: '#42a5f5'
                            graph_type: line
                            line_width: 2
                            show_fill: true
                            smooth: true
                            decimals: 0
                            aggregate_func: avg
                            tap_action:
                              action: more-info
                      - type: custom:statistics-graph-chart-card
                        card_header: IoT WLAN
                        show_grid: false
                        show_tooltip: true
                        show_legend: false
                        show_y_axis: false
                        show_x_axis: true
                        show_x_ticks: false
                        show_y_ticks: false
                        cache: true
                        animate_graph: false
                        hours_to_show: 6
                        points_per_hour: 4
                        height: 100
                        chart_mode: timeline
                        group_by: interval
                        entities:
                          - entity: sensor.mikrotik_home_iot_vlan_rx
                            name: kB/s
                            color: '#ff7043'
                            graph_type: line
                            line_width: 2
                            show_fill: true
                            smooth: true
                            decimals: 0
                            aggregate_func: avg
                            tap_action:
                              action: more-info
                      - type: custom:statistics-graph-chart-card
                        card_header: Perimeter
                        show_grid: false
                        show_tooltip: true
                        show_legend: false
                        show_y_axis: false
                        show_x_axis: true
                        show_x_ticks: false
                        show_y_ticks: false
                        cache: true
                        animate_graph: false
                        hours_to_show: 6
                        points_per_hour: 4
                        height: 100
                        chart_mode: timeline
                        group_by: interval
                        entities:
                          - entity: sensor.mikrotik_home_ether3_rx
                            name: kB/s
                            color: '#66bb6a'
                            graph_type: line
                            line_width: 2
                            show_fill: true
                            smooth: true
                            decimals: 0
                            aggregate_func: avg
                            tap_action:
                              action: more-info
        column_span: 4

      - type: grid
        cards:
          - type: heading
            heading_style: subtitle
            heading: SERVERS, PROXMOX & FRIGATE

          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 1fr 1fr 1fr
              grid-gap: 10px
              mediaquery:
                "(max-width: 1100px)":
                  grid-template-columns: 100%
            grid_options:
              columns: full
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:button-card
                    entity: sensor.system_monitor_processor_use
                    show_icon: false
                    show_name: false
                    show_state: false
                    show_label: false
                    triggers_update:
                      - sensor.system_monitor_disk_usage
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - background-color: '#1c1c1c'
                        - border: 1px solid rgba(255, 255, 255, 0.1)
                        - border-radius: 14px
                        - padding: 12px
                        - box-shadow: none
                      grid:
                        - grid-template-areas: '"ha"'
                      custom_fields:
                        ha:
                          - width: 100%
                    custom_fields:
                      ha: |
                        [[[
                          const bar = (label, pct, color) => {
                            const v = Math.min(100, Math.max(0, parseFloat(pct) || 0));
                            return `<div style="margin-bottom:10px;font-family:var(--ha-font-family,sans-serif);color:#fff;">
