                          const memPct = Math.min(100, Math.max(0, parseFloat(hass.states['sensor.portainer_memory_usage_percentage']?.state) || 0));
                          const memMb = hass.states['sensor.portainer_memory_usage'];
                          const memStr = memMb?.state != null ? `${Number(memMb.state).toFixed(1)} ${memMb.attributes?.unit_of_measurement || 'MB'}` : '—';
                          const stack = hass.states['sensor.nas2_compose_portainer']?.state ?? '—';
                          const shortImg = String(img).length > 42 ? String(img).slice(0, 40) + '…' : img;
                          return `<div style="font-family:var(--ha-font-family,sans-serif);color:#fff;">
                            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;">
                              <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                                <ha-icon icon="mdi:docker" style="flex-shrink:0;color:#13b0d3;--mdc-icon-size:40px;"></ha-icon>
                                <div style="min-width:0;">
                                  <div style="font-weight:700;font-size:0.95rem;">Portainer CE</div>
                                  <div style="font-size:0.68rem;opacity:0.75;margin-top:2px;">${dot} ${st} · stack: ${stack}</div>
                                </div>
                              </div>
                            </div>
                            <div style="font-size:0.68rem;opacity:0.8;margin-bottom:10px;word-break:break-all;">${shortImg}</div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.78rem;margin-bottom:10px;">
                              <div>CPU<br/><strong style="color:#ffb74d;">${cpu.toFixed(1)}%</strong></div>
                              <div>Memory<br/><strong style="color:#4fc3f7;">${memStr} (${memPct.toFixed(2)}%)</strong></div>
                            </div>
                            <div style="margin-bottom:4px;font-size:0.72rem;opacity:0.85;">Memory of limit</div>
                            <div style="height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">
                              <div style="width:${memPct}%;height:100%;background:linear-gradient(90deg,#13b0d3,#006ea3);"></div>
                            </div>
                          </div>`;
                        ]]]
                  - type: custom:layout-card
                    layout_type: custom:grid-layout
