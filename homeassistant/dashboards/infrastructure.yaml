                              const esc = (s) => String(s)
                                .replace(/&/g, '&amp;')
                                .replace(/</g, '&lt;')
                                .replace(/>/g, '&gt;')
                                .replace(/"/g, '&quot;');
                              const bar = (label, entityId, grad) => {
                                const raw = hass.states[entityId]?.state;
                                const v = Math.min(100, Math.max(0, parseFloat(raw) || 0));
                                return `<div style="margin-bottom:8px;font-family:var(--ha-font-family,sans-serif);color:#fff;">
                                  <div style="display:flex;justify-content:space-between;font-size:0.76rem;margin-bottom:3px;"><span>${label}</span><span>${fmt(v)}%</span></div>
                                  <div style="height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">
                                    <div style="width:${v}%;height:100%;background:${grad};"></div>
                                  </div>
                                </div>`;
                              };
                              const ipMapSt = hass.states['sensor.nvr_glances_nic_ipv4_map'];
                              const ipv4 = (attrKey) => {
                                if (!ipMapSt || !ipMapSt.attributes) return '—';
                                const v = ipMapSt.attributes[attrKey];
                                if (v == null || v === '' || ['unknown', 'unavailable', 'none'].includes(String(v).toLowerCase())) return '—';
                                return esc(String(v));
                              };
                              const ratePair = (rxId, txId) => {
                                const fr = (eid) => {
                                  const e = hass.states[eid];
                                  if (!e || ['unknown', 'unavailable', 'none', ''].includes(String(e.state).toLowerCase())) return '—';
                                  const n = parseFloat(e.state);
                                  if (isNaN(n)) return '—';
                                  const u = e.attributes?.unit_of_measurement || '';
                                  return `${fmt(n)} ${u}`.trim();
                                };
                                return `↓ ${fr(rxId)} · ↑ ${fr(txId)}`;
                              };
                              const procSt = hass.states['sensor.nvr_glances_top_processes'];
                              const parseProcList = (st) => {
                                if (!st || ['unavailable', 'unknown', 'none'].includes(String(st.state).toLowerCase())) return [];
                                let raw = st.attributes?.processes;
                                if (raw == null && st.attributes?.processes_json != null) {
                                  raw = st.attributes.processes_json;
                                }
                                if (typeof raw === 'string') {
                                  try {
                                    raw = JSON.parse(raw);
                                  } catch (e) {
                                    return [];
                                  }
                                }
                                return Array.isArray(raw) ? raw : [];
                              };
                              let procs = parseProcList(procSt);
                              let procHtml = '';
                              if (procs.length) {
                                const head = `<div style="display:flex;justify-content:space-between;gap:4px;margin:10px 0 4px 0;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);font-size:0.58rem;font-weight:700;opacity:0.75;text-transform:uppercase;letter-spacing:0.03em;">
                                  <span style="flex:1;min-width:0;">Process</span>
                                  <span style="width:38px;text-align:right;flex-shrink:0;">CPU</span>
                                  <span style="width:38px;text-align:right;flex-shrink:0;">Mem</span>
                                </div>`;
                                const rows = procs.map((p) => {
                                  const cpu = Math.min(100, Math.max(0, Number(p.cpu_percent ?? p.cpu ?? 0)));
                                  const mem = Math.min(100, Math.max(0, Number(p.memory_percent ?? p.memory ?? 0)));
                                  const nm = esc((p.name || '?').toString().slice(0, 36));
                                  return `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:4px;font-size:0.6rem;margin-bottom:3px;line-height:1.2;">
                                    <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.92;">${nm}</span>
                                    <span style="width:38px;text-align:right;flex-shrink:0;font-weight:600;color:#ffb74d;">${fmt(cpu)}%</span>
                                    <span style="width:38px;text-align:right;flex-shrink:0;font-weight:600;color:#81d4fa;">${fmt(mem)}%</span>
                                  </div>`;
                                }).join('');
                                procHtml = head + rows;
                              } else {
                                const hint = !procSt
                                  ? 'REST sensor missing. Put nvr_top_processes.yaml in the packages folder next to configuration.yaml, or !include it under homeassistant.packages. Then reload all YAML.'
                                  : (['unavailable', 'unknown'].includes(String(procSt.state).toLowerCase())
                                    ? `Process sensor is ${procSt.state}. HA cannot reach Glances (curl REST URL from HA; try 61208, /api/3 vs /api/4).`
                                    : 'No process rows. In States, open sensor.nvr_glances_top_processes and check attributes.processes.');
                                procHtml = `<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.58rem;opacity:0.5;line-height:1.35;">${hint}</div>`;
                              }
                              return `<div>
                                ${bar('NVR CPU', 'sensor.nvr_mostardesigns_com_cpu_usage', 'linear-gradient(90deg,#ff8a80,#ff4757)')}
                                ${bar('NVR RAM', 'sensor.nvr_mostardesigns_com_memory_usage', 'linear-gradient(90deg,#64b5f6,#378ADD)')}
                                ${bar('Host disk (/)', 'sensor.nvr_mostardesigns_com_etc_hostname_disk_usage', 'linear-gradient(90deg,#aed581,#7cb342)')}
                                ${procHtml}
                              </div>`;
                            ]]]
