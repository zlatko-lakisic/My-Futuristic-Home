# Sections view: column_span values are summed; the grid width is min(viewport, that sum).
# Using 6+2+2+2 made the layout fight a 4‑column viewport (default min column width).
# max_columns: 3 + spans 3+1+1+1 keeps the three main bands equal width on typical tablets.
views:
  - title: Home Control
    path: home-control
    icon: mdi:home-automation
    type: sections
    max_columns: 3
    dense_section_placement: false
    sections:
      - type: grid
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: sensor.nest_temperature_sensor_master_bedroom_temperature
                show_name: false
                show_state: true
                show_icon: true
                tap_action:
                  action: more-info
                styles:
                  card:
                    - border-radius: 999px
                    - padding: 8px 14px
                    - margin: 0 6px 0 0
                    - box-shadow: none
                    - border: 1px solid rgba(255, 255, 255, 0.12)
                    - background: rgba(148, 163, 184, 0.2)
                  state:
                    - font-size: 14px
                    - font-weight: 600
              - type: custom:button-card
                entity: sensor.nest_temperature_sensor_living_room_temperature
                show_name: false
                show_state: true
                show_icon: true
                tap_action:
                  action: more-info
                styles:
                  card:
                    - border-radius: 999px
                    - padding: 8px 14px
                    - margin: 0 6px 0 0
                    - box-shadow: none
                    - border: 1px solid rgba(255, 255, 255, 0.12)
                    - background: rgba(148, 163, 184, 0.2)
                  state:
                    - font-size: 14px
                    - font-weight: 600
              - type: custom:button-card
                entity: binary_sensor.nest_protect_hallway_smoke_status
                name: Smoke
                show_name: true
                show_state: true
                show_icon: true
                tap_action:
                  action: more-info
                styles:
                  card:
                    - border-radius: 999px
                    - padding: 8px 14px
                    - box-shadow: none
                    - border: 1px solid rgba(255, 255, 255, 0.12)
                    - background: rgba(148, 163, 184, 0.2)
                  name:
                    - font-size: 12px
                    - opacity: 0.9
                  state:
                    - font-size: 14px
                    - font-weight: 600
        column_span: 3
      - type: grid
        cards:
          - type: heading
            heading: CLIMATE & COMFORT
            heading_style: title
          - type: thermostat
            entity: climate.new_livingroom_climate
            grid_options:
              columns: full
          - type: tile
            entity: switch.house_fan
            name: Hallway fan
            icon: mdi:fan
            vertical: false
            features:
              - type: toggle
            grid_options:
              columns: full
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: LIVING AREAS
          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: light.in_wall_paddle_dimmer_no_ntrl_700s
                name: Living / middle
                features:
                  - type: light-brightness
              - type: tile
                entity: light.kitchenette_light
                name: Kitchen main
                features:
                  - type: light-brightness
              - type: tile
                entity: light.kitchen_countertop_lights_light
                name: Countertop
                features:
                  - type: light-brightness
              - type: custom:button-card
                name: Dining
                icon: mdi:ceiling-light-multiple-outline
                show_name: true
                show_state: false
                show_icon: true
                tap_action:
                  action: none
                styles:
                  card:
                    - opacity: 0.9
                    - border: 1px dashed rgba(255, 255, 255, 0.25)
                  name:
                    - font-size: 14px
            grid_options:
              columns: full
              rows: auto
          - type: media-control
            entity: media_player.living_room_tv
            grid_options:
              columns: full
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading: BEDROOMS & UTILITY
            heading_style: title
          - type: horizontal-stack
            cards:
              - type: tile
                entity: switch.master_bedroom_light_switch
                name: Master main
                features:
                  - type: toggle
              - type: tile
                entity: light.master_bedroom_closet_lights_top_light
                name: Closet
                features:
                  - type: light-brightness
              - type: tile
                entity: switch.vanity
                name: Vanity
                features:
                  - type: toggle
            title: Master Suite
            grid_options:
              columns: full
          - type: horizontal-stack
            cards:
              - type: tile
                entity: light.steps_light_switch
                vertical: false
                tap_action:
                  action: toggle
                features_position: inline
              - type: tile
                entity: light.basement_light
                vertical: false
                tap_action:
                  action: toggle
                features_position: inline
            title: Other Areas
            grid_options:
              columns: full
          - type: entities
            title: Motion & status
            show_header_toggle: false
            state_color: true
            entities:
              - entity: binary_sensor.light_switch_motion_detection
                name: Hallway motion
              - entity: binary_sensor.presence_sensor
                name: Basement motion
              - entity: binary_sensor.garage_hallway_light_switch_motion_detection
                name: Garage motion
            grid_options:
              columns: full
          - type: custom:stack-in-card
            grid_options:
              columns: full
            keep:
              margin: false
              outer_padding: false
            card_mod:
              style: |
                ha-card {
                  background: #1c1c1c !important;
                  border: 1px solid rgba(255,255,255,0.1) !important;
                  border-radius: 14px !important;
                  box-shadow: none !important;
                  padding: 12px !important;
                  overflow: visible !important;
                }
                ha-card stack-in-card ha-card,
                stack-in-card ha-card {
                  --ha-card-border-width: 0px !important;
                  --ha-card-box-shadow: none !important;
                  border: none !important;
                  outline: none !important;
                  box-shadow: none !important;
                }
                stack-in-card > div {
                  border: none !important;
                  box-shadow: none !important;
                }
            cards:
              - type: entities
                title: BHyve manual watering
                show_header_toggle: false
                state_color: true
                entities:
                  - entity: input_select.bhyve_manual_zone
                    name: Zone
              - type: entities
                show_header_toggle: false
                state_color: true
                card_mod:
                  style: |
                    [[[
                      const eid = hass.states['sensor.bhyve_zone_entity']?.state;
                      const locked = eid && eid !== 'unknown' && hass.states[eid]?.state === 'on';
                      return locked
                        ? ':host { cursor: not-allowed; } :host .card-content { pointer-events: none; opacity: 0.5; filter: grayscale(0.25); }'
                        : '';
                    ]]]
                entities:
                  - entity: input_number.bhyve_manual_duration_minutes
                    name: Watering time
              - type: custom:button-card
                triggers_update:
                  - input_select.bhyve_manual_zone
                  - sensor.bhyve_zone_entity
                  - switch.garden_zone
                  - switch.east_lawn_timer_east_lawn_zone
                  - switch.east_lawn_timer_flower_bed_zone
                  - switch.flower_garden_back_lawn_time_2nd_tier_flowers_zone
                  - switch.flower_garden_back_lawn_time_back_lawn_zone_zone
                  - switch.unnamed_zone_zone_2
                  - switch.front_yard_controller_front_yard_zone
                  - switch.vegitable_garden_timer_peppers_kale_zone_zone
                  - switch.vegitable_garden_timer_tomato_zone_zone
                  - switch.vegitable_garden_timer_top_zone_zone
                  - switch.vegitable_garden_timer_zucchini_zone_zone
                name: |
                  [[[
                    const eid = states['sensor.bhyve_zone_entity']?.state;
                    const running = eid && eid !== 'unknown' && states[eid]?.state === 'on';
                    return running ? 'Stop' : 'Start';
                  ]]]
                icon: |
                  [[[
                    const eid = states['sensor.bhyve_zone_entity']?.state;
                    const running = eid && eid !== 'unknown' && states[eid]?.state === 'on';
                    return running ? 'mdi:stop-circle' : 'mdi:play-circle';
                  ]]]
                tap_action:
                  action: call-service
                  service: script.turn_on
                  service_data:
                    entity_id: script.bhyve_toggle_selected_zone
                styles:
                  card:
                    - border-radius: 12px
                    - padding: 12px
                    - margin: 8px 0 0 0
                    - font-weight: 700
                    - background-color: |
                        [[[
                          const eid = states['sensor.bhyve_zone_entity']?.state;
                          const running = eid && eid !== 'unknown' && states[eid]?.state === 'on';
                          return running ? '#b71c1c' : '#1b5e20';
                        ]]]
                  name:
                    - color: white
                    - font-size: 15px
                  icon:
                    - color: white
        column_span: 1
