# TOTAL HOME INTERIOR CONTROL — Lovelace (YAML)
#
# Entity picks from Home Assistant MCP (ha_list_entities / ha_get_entity_state).
# Requires: layout-card (same as infrastructure / torrents dashboards).
#
# Gaps / verify on your install:
#   - Dining: no "dining" entities returned — placeholder markdown only.
#   - Living room: no main ceiling light entity — add when you have one. Climate card uses climate.new_livingroom_climate (Midea cool + Nest/oil heat).
#   - Office: no office ceiling light — speaker + Nest Protect only.
#   - Bedroom hallway main: light.light_switch (generic name; tied to dim_bedroom_hallway_light automation).
#   - Guest closet: light.closet_light ("Closet") — confirm it is guest closet.
#   - Front hallway temp: Nest living-room sensor as interior reference (no front-door Nest sensor).
#   - House fan: switch.house_fan only (no speed slider entity).
#   - Vanity: switch.vanity (often unavailable / restored).
#   - Mockup timers ("12s left"): not wired — add timer helpers + template if desired.

views:
  - title: Home Control
    path: home-control
    type: panel
    icon: mdi:home-automation
    cards:
      - type: vertical-stack
        cards:
          - type: heading
            heading_style: title
            heading: TOTAL HOME INTERIOR CONTROL

          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: repeat(3, minmax(280px, 1fr))
              grid-gap: 10px
              place-items: stretch
              align-items: stretch
              mediaquery:
                '(max-width: 1000px)':
                  grid-template-columns: 100%
            grid_options:
              columns: full
            cards:
              # ——— Column 1 ———
              - type: vertical-stack
                cards:
                  - type: entities
                    title: MASTER BEDROOM
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: switch.master_bedroom_light_switch
                        name: Main lights
                      - entity: light.master_bedroom_closet_lights_top_light
                        name: Closet lights (top)
                      - entity: light.master_bedroom_closet_light_bottom_light
                        name: Closet lights (bottom)
                      - entity: switch.vanity
                        name: Vanity light
                      - entity: sensor.nest_temperature_sensor_master_bedroom_temperature
                        name: Nest temp sensor
                      - entity: binary_sensor.master_bedroom_closet_presence_sensor_motion
                        name: Closet motion
                  - type: media-control
                    entity: media_player.master_bedroom_tv
                  - type: media-control
                    entity: media_player.master_bedroom_speaker

                  - type: entities
                    title: MIDDLE ROOM
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - light.in_wall_paddle_dimmer_no_ntrl_700s

                  - type: entities
                    title: GUEST ROOM
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: switch.light_switch_2
                        name: Main lights
                      - entity: light.closet_light
                        name: Closet lights

              # ——— Column 2 ———
              - type: vertical-stack
                cards:
                  - type: entities
                    title: BEDROOM HALLWAY
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: light.light_switch
                        name: Main lights
                      - entity: switch.house_fan
                        name: House fan
                      - entity: binary_sensor.nest_protect_hallway_smoke_status
                        name: Nest Protect smoke

                  - type: entities
                    title: FRONT DOOR HALLWAY
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: switch.front_door_light
                        name: Main lights
                      - entity: sensor.nest_temperature_sensor_living_room_temperature
                        name: Nest temp (living / entry zone)

                  - type: markdown
                    content: |
                      ### LIVING ROOM
                      *Thermostat: Midea AC (cool) + Nest / oil hydronic (heat) via `climate.new_livingroom_climate`.*
                      *Main lights: add a `light.*` row when you have a ceiling/group entity.*
                  - type: media-control
                    entity: media_player.living_room_tv
                  - type: thermostat
                    entity: climate.new_livingroom_climate
                  - type: media-control
                    entity: media_player.living_room_speaker

              # ——— Column 3 ———
              - type: vertical-stack
                cards:
                  - type: markdown
                    content: |
                      ### DINING ROOM
                      No dining-area entities were found via MCP search.
                      Add an `entities` card when you have a dining light or group.

                  - type: entities
                    title: KITCHEN
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - light.kitchen_countertop_lights_light
                      - light.kitchenette_counter_light_light
                      - light.kitchenette_light

                  - type: entities
                    title: BOTTOM HALLWAY
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: light.kitchen_countertop_lights_light
                        name: Countertop lights
                      - entity: light.garage_hallway_light_switch
                        name: Garage hallway lights

                  - type: entities
                    title: OFFICE
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - type: markdown
                        content: >
                          *Main lights: add a `light.*` row when available.*
                      - entity: binary_sensor.nest_protect_office_smoke_status
                        name: Nest Protect smoke
                  - type: media-control
                    entity: media_player.office_speaker

                  - type: entities
                    title: BASEMENT
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - light.basement_light
                      - entity: binary_sensor.presence_sensor
                        name: Motion / presence
                      - entity: binary_sensor.nest_protect_basement_smoke_status
                        name: Nest Protect smoke

                  - type: custom:stack-in-card
                    keep:
                      margin: false
                      outer_padding: false
                    card_mod:
                      style: |
                        ha-card {
                          background: #1c1c1c !important;
                          border: 1px solid rgba(255,255,255,0.1) !important;
                          border-radius: 14px !important;
                          box-shadow: none !important;
                          padding: 12px !important;
                          overflow: visible !important;
                        }
                        ha-card stack-in-card ha-card,
                        stack-in-card ha-card {
                          --ha-card-border-width: 0px !important;
                          --ha-card-box-shadow: none !important;
                          border: none !important;
                          outline: none !important;
                          box-shadow: none !important;
                        }
                        stack-in-card > div {
                          border: none !important;
                          box-shadow: none !important;
                        }
                    cards:
                      - type: entities
                        title: BHYVE MANUAL WATERING
                        show_header_toggle: false
                        state_color: true
                        entities:
                          - entity: input_select.bhyve_manual_zone
                            name: Zone
                      - type: entities
                        show_header_toggle: false
                        state_color: true
                        card_mod:
                          style: |
                            [[[
                              const eid = hass.states['sensor.bhyve_zone_entity']?.state;
                              const locked = eid && eid !== 'unknown' && hass.states[eid]?.state === 'on';
                              return locked
                                ? ':host { cursor: not-allowed; } :host .card-content { pointer-events: none; opacity: 0.5; filter: grayscale(0.25); }'
                                : '';
                            ]]]
                        entities:
                          - entity: input_number.bhyve_manual_duration_minutes
                            name: Watering time
                      - type: custom:button-card
                        triggers_update:
                          - input_select.bhyve_manual_zone
                          - sensor.bhyve_zone_entity
                          - switch.east_lawn_timer_east_lawn_zone
                          - switch.east_lawn_timer_flower_bed_zone
                          - switch.flower_garden_back_lawn_time_2nd_tier_flowers_zone
                          - switch.flower_garden_back_lawn_time_back_lawn_zone_zone
                          - switch.front_yard_controller_front_yard_zone
                          - switch.garden_zone
                          - switch.unnamed_zone_zone_2
                          - switch.vegitable_garden_timer_peppers_kale_zone_zone
                          - switch.vegitable_garden_timer_tomato_zone_zone
                          - switch.vegitable_garden_timer_top_zone_zone
                          - switch.vegitable_garden_timer_zucchini_zone_zone
                        name: |
                          [[[
                            const eid = states['sensor.bhyve_zone_entity']?.state;
                            const running = eid && eid !== 'unknown' && states[eid]?.state === 'on';
                            return running ? 'Stop' : 'Start';
                          ]]]
                        icon: |
                          [[[
                            const eid = states['sensor.bhyve_zone_entity']?.state;
                            const running = eid && eid !== 'unknown' && states[eid]?.state === 'on';
                            return running ? 'mdi:stop-circle' : 'mdi:play-circle';
                          ]]]
                        tap_action:
                          action: call-service
                          service: script.turn_on
                          service_data:
                            entity_id: script.bhyve_toggle_selected_zone
                        styles:
                          card:
                            - border-radius: 12px
                            - padding: 12px
                            - margin: 8px 0 0 0
                            - font-weight: 700
                            - background-color: |
                                [[[
                                  const eid = states['sensor.bhyve_zone_entity']?.state;
                                  const running = eid && eid !== 'unknown' && states[eid]?.state === 'on';
                                  return running ? '#b71c1c' : '#1b5e20';
                                ]]]
                          name:
                            - color: white
                            - font-size: 15px
                          icon:
                            - color: white
