# QBITTORRENT DOWNLOAD STATION — Lovelace (YAML mode)
#
# View type: panel (single full-width column). Sections view centers content with a max width.
#
# Requires the same custom cards / resources as infrastructure.yaml:
#   layout-card, button-card, statistics-graph-chart-card, modern-circular-gauge
#
# Stock qBittorrent integration: aggregate sensors only (no per-torrent entities).
# Speed gauges & transfer chart use template sensors (KiB/s): see packages/qbittorrent_speed_k.yaml.
# To embed the Web UI, iframe uses secret qbittorrent_webui_url.

views:
  - title: Torrents
    path: torrents
    type: panel
    icon: mdi:download-network
    cards:
      - type: vertical-stack
        cards:
          - type: heading
            heading_style: title
            heading: QBITTORRENT DOWNLOAD STATION

          - type: heading
            heading_style: subtitle
            icon: mdi:speedometer
            heading: Session & transfer speed

          # Same grid pattern as Infrastructure → Mikrotik (2 compact gauge cols + throughput-style charts).
          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: minmax(132px, 0.9fr) minmax(132px, 0.9fr) minmax(0, 1fr) minmax(0, 1fr)
              grid-gap: 10px
              place-items: stretch
              align-items: stretch
              mediaquery:
                '(max-width: 1200px)':
                  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr))
                '(max-width: 560px)':
                  grid-template-columns: 100%
            grid_options:
              columns: full
            cards:
              - type: custom:modern-circular-gauge
                entity: sensor.qbittorrent_download_speed_kib
                name: CPU
                gauge_type: standard
                needle: false
                smooth_segments: true
                min: 0
                max: 51200
                show_icon: true
                icon: mdi:download
                header_position: top
                show_header: false
                state_font_size: 22
                gauge_radius: 40
                decimals: 1
                gauge_background_style:
                  width: 10
                  opacity: 0.7
                gauge_foreground_style:
                  width: 8
                  color: adaptive
                adaptive_icon_color: true
                segments:
                  - from: 0
                    color:
                      - 33
                      - 150
                      - 243
                  - from: 12288
                    color:
                      - 3
                      - 169
                      - 244
                  - from: 25600
                    color:
                      - 0
                      - 188
                      - 212
                  - from: 40960
                    color:
                      - 128
                      - 222
                      - 234
                  - from: 51200
                    color:
                      - 179
                      - 229
                      - 252
                secondary: {}
                tap_action:
                  action: more-info
              - type: custom:modern-circular-gauge
                entity: sensor.qbittorrent_upload_speed_kib
                name: Upload
                gauge_type: standard
                needle: false
                smooth_segments: true
                min: 0
                max: 51200
                show_icon: true
                icon: mdi:upload
                header_position: top
                show_header: false
                state_font_size: 22
                gauge_radius: 40
                decimals: 1
                gauge_background_style:
                  width: 10
                  opacity: 0.7
                gauge_foreground_style:
                  width: 8
                  color: adaptive
                adaptive_icon_color: true
                segments:
                  - from: 0
                    color:
                      - 102
                      - 187
                      - 106
                  - from: 12288
                    color:
                      - 67
                      - 160
                      - 71
                  - from: 25600
                    color:
                      - 56
                      - 142
                      - 60
                  - from: 40960
                    color:
                      - 165
                      - 214
                      - 167
                  - from: 51200
                    color:
                      - 200
                      - 230
                      - 201
                secondary: {}
                tap_action:
                  action: more-info
              - type: custom:statistics-graph-chart-card
                card_header: Transfer speed (6h, KiB/s)
                show_grid: false
                show_tooltip: true
                show_legend: false
                show_y_axis: false
                show_x_axis: true
                show_x_ticks: false
                show_y_ticks: false
                cache: true
                animate_graph: false
                hours_to_show: 6
                points_per_hour: 4
                height: 112
                chart_mode: timeline
                group_by: interval
                entities:
                  - entity: sensor.qbittorrent_download_speed_kib
                    name: Download
                    color: '#ff9800'
                    graph_type: line
                    line_width: 2
                    show_fill: true
                    smooth: true
                    decimals: 2
                    aggregate_func: avg
                  - entity: sensor.qbittorrent_upload_speed_kib
                    name: Upload
                    color: '#ab47bc'
                    graph_type: line
                    line_width: 2
                    show_fill: true
                    smooth: true
                    decimals: 2
                    aggregate_func: avg
                    tap_action:
                      action: more-info
              - type: custom:statistics-graph-chart-card
                card_header: Torrent states (6h)
                show_grid: false
                show_tooltip: true
                show_legend: false
                show_y_axis: false
                show_x_axis: true
                show_x_ticks: false
                show_y_ticks: false
                cache: true
                animate_graph: false
                hours_to_show: 6
                points_per_hour: 4
                height: 112
                chart_mode: timeline
                group_by: interval
                entities:
                  - entity: sensor.qbittorrent_active_torrents
                    name: Active
                    color: '#42a5f5'
                    graph_type: line
                    line_width: 2
                    show_fill: true
                    smooth: true
                    decimals: 0
                    aggregate_func: max
                  - entity: sensor.qbittorrent_paused_torrents
                    name: Paused
                    color: '#ff9800'
                    graph_type: line
                    line_width: 2
                    show_fill: true
                    smooth: true
                    decimals: 0
                    aggregate_func: max
                  - entity: sensor.qbittorrent_errored_torrents
                    name: Errored
                    color: '#ab47bc'
                    graph_type: line
                    line_width: 2
                    show_fill: false
                    smooth: true
                    decimals: 0
                    aggregate_func: max
          - type: heading
            heading_style: subtitle
            icon: mdi:counter
            heading: Torrent counts

          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: repeat(3, minmax(0, 1fr))
              grid-gap: 12px
              place-items: stretch
              mediaquery:
                '(max-width: 768px)':
                  grid-template-columns: 1fr
            grid_options:
              columns: full
            cards:
              - type: tile
                entity: sensor.qbittorrent_active_torrents
                name: Active
                icon: mdi:progress-download
                color: green
                tap_action:
                  action: more-info
              - type: tile
                entity: sensor.qbittorrent_inactive_torrents
                name: Inactive
                icon: mdi:sleep
                color: cyan
                tap_action:
                  action: more-info
              - type: tile
                entity: sensor.qbittorrent_paused_torrents
                name: Paused
                icon: mdi:pause
                color: orange
                tap_action:
                  action: more-info
              - type: tile
                entity: sensor.qbittorrent_errored_torrents
                name: Errored
                icon: mdi:alert-circle
                color: red
                tap_action:
                  action: more-info
              - type: tile
                entity: sensor.qbittorrent_all_torrents
                name: Total
                icon: mdi:format-list-bulleted
                color: primary
                tap_action:
                  action: more-info
              - type: tile
                entity: sensor.qbittorrent_status
                name: Mode
                icon: mdi:state-machine
                color: amber
                tap_action:
                  action: more-info

          - type: entities
            title: Controls & totals
            show_header_toggle: false
            state_color: true
            entities:
              - entity: switch.qbittorrent_alternative_speed
                name: Alternative speed
              - entity: sensor.qbittorrent_connection_status
                name: Connection
              - entity: sensor.qbittorrent_global_ratio
                name: Global ratio
              - entity: sensor.qbittorrent_all_time_download
                name: All-time download
              - entity: sensor.qbittorrent_all_time_upload
                name: All-time upload

          - type: heading
            heading_style: subtitle
            icon: mdi:format-list-bulleted-type
            heading: Active transfers (Web UI)

          - type: iframe
            url: !secret qbittorrent_webui_url
            aspect_ratio: 150%
